<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Touchstone Mixed-Mode Converter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="lib/shared.css">
<style>
body { padding: 2rem 1rem; }

.app {
  max-width: 820px;
  margin: 0 auto;
}

header {
  margin-bottom: 2rem;
  padding-bottom: 1.25rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: baseline;
  gap: 1rem;
}

.logo {
  font-family: var(--mono);
  font-size: 1.1rem;
  font-weight: 500;
  letter-spacing: -0.02em;
  color: var(--text);
}

.logo span { color: var(--accent-mid); }

.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.25rem;
  margin-bottom: 1rem;
}

.panel-title {
  font-size: 0.6875rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 0.875rem;
}

.drop-zone {
  border: 1.5px dashed var(--border-mid);
  border-radius: var(--radius);
  padding: 2rem;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  position: relative;
}

.drop-label { font-size: 0.875rem; color: var(--text-muted); }
.drop-sub { font-size: 0.75rem; color: var(--text-faint); margin-top: 0.25rem; font-family: var(--mono); }

.file-loaded {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.625rem 0.75rem;
  background: var(--accent-bg);
  border: 1px solid #A8D9C8;
  border-radius: var(--radius);
  font-size: 0.8125rem;
  margin-top: 0.75rem;
}

.file-loaded-name { font-family: var(--mono); font-size: 0.775rem; flex: 1; color: var(--accent); }
.file-loaded-meta { font-size: 0.7rem; color: var(--text-faint); font-family: var(--mono); }

.clear-file-btn {
  font-size: 0.7rem;
  padding: 0.15rem 0.4rem;
  border: 1px solid transparent;
  border-radius: 4px;
  background: transparent;
  color: var(--text-faint);
  cursor: pointer;
  transition: all 0.12s;
}
.clear-file-btn:hover { background: var(--error-bg); color: var(--error); }

/* Port pair config */
.preset-row {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 1rem;
}

.preset-label {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-right: 0.25rem;
}

.preset-btn {
  font-family: var(--mono);
  font-size: 0.75rem;
  padding: 0.3rem 0.7rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.12s;
}
.preset-btn:hover { border-color: var(--accent-mid); color: var(--accent); }
.preset-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.pair-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8125rem;
}

.pair-table th {
  font-size: 0.6875rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-faint);
  text-align: left;
  padding: 0 0.5rem 0.5rem;
  border-bottom: 1px solid var(--border);
}

.pair-table td {
  padding: 0.5rem;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}

.pair-table tr:last-child td { border-bottom: none; }

.pair-label {
  font-family: var(--mono);
  font-size: 0.775rem;
  color: var(--text);
}

.pair-label-d { color: var(--accent); }
.pair-label-c { color: var(--text-muted); }

.port-select {
  font-family: var(--mono);
  font-size: 0.775rem;
  padding: 0.3rem 0.5rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  transition: border-color 0.12s;
  min-width: 80px;
}
.port-select:hover { border-color: var(--accent-mid); }
.port-select:focus { outline: none; border-color: var(--accent); }

.port-sign {
  font-family: var(--mono);
  font-size: 0.75rem;
  padding: 0 0.25rem;
}
.port-sign-pos { color: var(--accent); font-weight: 600; }
.port-sign-neg { color: var(--error); font-weight: 600; }

.port-cell { display: flex; align-items: center; gap: 0.375rem; }

.pair-output {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--text-faint);
}

.validation-msg {
  font-size: 0.75rem;
  font-family: var(--mono);
  padding: 0.375rem 0.625rem;
  border-radius: var(--radius);
  margin-top: 0.5rem;
}
.validation-ok { background: var(--accent-bg); color: var(--accent); }
.validation-error { background: var(--error-bg); color: var(--error); }

/* Format selector */
.format-row {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.format-label {
  font-size: 0.8125rem;
  color: var(--text-muted);
  min-width: 80px;
}

.format-options { display: flex; gap: 0.375rem; }

.fmt-btn {
  font-family: var(--mono);
  font-size: 0.8125rem;
  font-weight: 500;
  padding: 0.375rem 0.875rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.12s;
}
.fmt-btn:hover { border-color: var(--accent-mid); color: var(--accent); }
.fmt-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.fmt-desc {
  font-size: 0.75rem;
  color: var(--text-faint);
  font-family: var(--mono);
}

/* Result panel */
.result-info {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 0.75rem;
  margin-bottom: 1rem;
}

.result-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0.75rem;
}

.result-card-label {
  font-size: 0.6875rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-bottom: 0.3rem;
}

.result-card-value {
  font-family: var(--mono);
  font-size: 0.875rem;
  color: var(--text);
}

.port-map-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.775rem;
  font-family: var(--mono);
}

.port-map-table th {
  font-size: 0.6875rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-faint);
  text-align: left;
  padding: 0 0.5rem 0.4rem;
  border-bottom: 1px solid var(--border);
}

.port-map-table td {
  padding: 0.35rem 0.5rem;
  border-bottom: 1px solid var(--border);
  color: var(--text);
}

.port-map-table tr:last-child td { border-bottom: none; }

.tag-d {
  display: inline-block;
  background: var(--accent-bg);
  color: var(--accent);
  font-size: 0.65rem;
  padding: 0.1rem 0.35rem;
  border-radius: 3px;
  font-weight: 500;
}

.tag-c {
  display: inline-block;
  background: var(--warning-bg);
  color: var(--warning);
  font-size: 0.65rem;
  padding: 0.1rem 0.35rem;
  border-radius: 3px;
  font-weight: 500;
}

/* Action bar */
.action-bar {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 0.5rem;
  flex-wrap: wrap;
}

.btn {
  font-family: var(--sans);
  font-size: 0.8125rem;
  font-weight: 500;
  padding: 0.5rem 1.1rem;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.12s;
  border: 1px solid;
}

.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: #0A4F3E; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-secondary { background: var(--surface); color: var(--text); border-color: var(--border); }
.btn-secondary:hover { border-color: var(--border-mid); background: var(--bg); }
.btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }

.empty-state {
  text-align: center;
  padding: 2rem;
  color: var(--text-faint);
  font-size: 0.8125rem;
}
</style>
</head>
<body>
<div class="app">

<header>
  <div class="logo">Touchstone<span>·</span>MixedMode</div>
  <div class="subtitle">シングルエンド Sパラメータ → Mixed-mode（差動 / コモン）変換ツール（偶数ポート対応）</div>
</header>

<!-- File input -->
<div class="panel">
  <div class="panel-title">Input</div>
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".s2p,.s4p,.s6p,.s8p">
    <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    <div class="drop-label"><strong>クリックまたはドロップ</strong>して Touchstone ファイルを追加</div>
    <div class="drop-sub">偶数ポートの .s2p / .s4p / .s6p / .s8p（1 ファイル）</div>
  </div>
  <div id="fileLoaded" hidden></div>
</div>

<!-- Port pair config -->
<div class="panel" id="portPanel" hidden>
  <div class="panel-title">差動ポートペア設定</div>

  <div class="preset-row">
    <span class="preset-label">プリセット:</span>
    <button class="preset-btn" id="presetSplit" title="ポート 1〜N/2 を正端子、N/2+1〜N を負端子として対応させます">上下分割</button>
    <button class="preset-btn" id="presetAdjacent" title="奇数ポートを正端子、偶数ポートを負端子として隣接ペアに設定します">隣接ペア</button>
  </div>

  <table class="pair-table" id="pairTable">
    <thead>
      <tr>
        <th>差動ポート</th>
        <th>正端子 (+)</th>
        <th>負端子 (−)</th>
        <th>出力ポート</th>
      </tr>
    </thead>
    <tbody id="pairBody"></tbody>
  </table>

  <div id="pairValidation" class="validation-msg validation-ok" hidden></div>
</div>

<!-- Output format -->
<div class="panel" id="formatPanel" hidden>
  <div class="panel-title">出力フォーマット</div>
  <div class="format-row">
    <span class="format-label">変換形式</span>
    <div class="format-options">
      <button class="fmt-btn active" data-fmt="DB">DB</button>
      <button class="fmt-btn" data-fmt="MA">MA</button>
      <button class="fmt-btn" data-fmt="RI">RI</button>
    </div>
    <span class="fmt-desc" id="fmtDesc">20·log₁₀(mag) + phase [deg]</span>
  </div>
</div>

<!-- Result -->
<div class="panel" id="resultPanel" hidden>
  <div class="panel-title">変換結果</div>
  <div class="result-info" id="resultInfo"></div>
  <div id="portMapWrap"></div>
</div>

<div class="action-bar">
  <button class="btn btn-secondary" id="convertBtn" disabled>変換する</button>
  <button class="btn btn-primary" id="dlBtn" disabled>ダウンロード</button>
</div>

</div><!-- .app -->

<script src="lib/touchstone.js"></script>
<script src="lib/ui-helpers.js"></script>
<script type="module">

// ── Constants ──────────────────────────────────────────────────────────────
const FORMAT_DESC = {
  DB: '20·log₁₀(mag) + phase [deg]',
  MA: 'sqrt(Re²+Im²) + phase [deg]',
  RI: 'Re + Im',
};

// ── State ──────────────────────────────────────────────────────────────────
let currentFile   = null;
let parsedData    = null;
let portCount     = 0;
let outputFmt     = 'DB';
let convertedText = null;
let outputName    = null;

// ── DOM refs ───────────────────────────────────────────────────────────────
const dropZone      = document.getElementById('dropZone');
const fileInput     = document.getElementById('fileInput');
const fileLoadedEl  = document.getElementById('fileLoaded');
const portPanel     = document.getElementById('portPanel');
const formatPanel   = document.getElementById('formatPanel');
const resultPanel   = document.getElementById('resultPanel');
const pairBody      = document.getElementById('pairBody');
const pairValidEl   = document.getElementById('pairValidation');
const resultInfo    = document.getElementById('resultInfo');
const portMapWrap   = document.getElementById('portMapWrap');
const convertBtn    = document.getElementById('convertBtn');
const dlBtn         = document.getElementById('dlBtn');
const fmtDesc       = document.getElementById('fmtDesc');

// ── Matrix helpers (M is real, S is complex {re, im}) ─────────────────────

/**
 * Build the mode transformation matrix M (2N × 2N, real).
 * pairsConfig: [{pos, neg}] (0-indexed port numbers), length = N
 * Row i     (0..N-1): differential d_{i+1}  → +1/√2 at pos, -1/√2 at neg
 * Row N+i   (0..N-1): common-mode  c_{i+1}  → +1/√2 at pos, +1/√2 at neg
 */
function buildM(pairsConfig, twoN) {
  const inv2 = 1 / Math.sqrt(2);
  const N = pairsConfig.length;
  const M = Array.from({ length: twoN }, () => new Float64Array(twoN));
  for (let i = 0; i < N; i++) {
    const { pos, neg } = pairsConfig[i];
    M[i][pos]     =  inv2;
    M[i][neg]     = -inv2;
    M[N + i][pos] =  inv2;
    M[N + i][neg] =  inv2;
  }
  return M;
}

/**
 * Convert parsed pairs array to row-major complex S-matrix.
 * Handles the Touchstone 1.0 quirk: 2-port uses column-major ordering.
 */
function pairsToMatrix(pairs, n, inFmt) {
  const S = Array.from({ length: n }, () =>
    Array.from({ length: n }, () => ({ re: 0, im: 0 }))
  );
  for (let j = 0; j < n * n; j++) {
    const [a, b] = pairs[j];
    const [re, im] = TT.toRI(a, b, inFmt);
    let row, col;
    if (n === 2) {
      col = Math.floor(j / n);
      row = j % n;
    } else {
      row = Math.floor(j / n);
      col = j % n;
    }
    S[row][col] = { re, im };
  }
  return S;
}

/**
 * Convert row-major complex S-matrix to output pairs array.
 * Applies the same ordering convention as input (2-port = column-major).
 */
function matrixToPairs(S, n, outFmt) {
  const pairs = [];
  for (let j = 0; j < n * n; j++) {
    let row, col;
    if (n === 2) {
      col = Math.floor(j / n);
      row = j % n;
    } else {
      row = Math.floor(j / n);
      col = j % n;
    }
    const { re, im } = S[row][col];
    pairs.push(TT.fromRI(re, im, outFmt));
  }
  return pairs;
}

/**
 * Compute S_mm = M × S_se × M^T  (M is real, S is complex)
 */
function mixedModeTransform(Sse, M, n) {
  // Step 1: temp = S_se × M^T  →  temp[i][j] = Σ_k Sse[i][k] * M[j][k]
  const temp = Array.from({ length: n }, () =>
    Array.from({ length: n }, () => ({ re: 0, im: 0 }))
  );
  for (let i = 0; i < n; i++) {
    for (let j = 0; j < n; j++) {
      let re = 0, im = 0;
      for (let k = 0; k < n; k++) {
        re += Sse[i][k].re * M[j][k];
        im += Sse[i][k].im * M[j][k];
      }
      temp[i][j] = { re, im };
    }
  }
  // Step 2: S_mm = M × temp  →  Smm[i][j] = Σ_k M[i][k] * temp[k][j]
  const Smm = Array.from({ length: n }, () =>
    Array.from({ length: n }, () => ({ re: 0, im: 0 }))
  );
  for (let i = 0; i < n; i++) {
    for (let j = 0; j < n; j++) {
      let re = 0, im = 0;
      for (let k = 0; k < n; k++) {
        re += M[i][k] * temp[k][j].re;
        im += M[i][k] * temp[k][j].im;
      }
      Smm[i][j] = { re, im };
    }
  }
  return Smm;
}

// ── Conversion ─────────────────────────────────────────────────────────────
function getPairsConfig() {
  const rows = pairBody.querySelectorAll('tr');
  return Array.from(rows).map(tr => ({
    pos: parseInt(tr.querySelector('[data-role="pos"]').value, 10),
    neg: parseInt(tr.querySelector('[data-role="neg"]').value, 10),
  }));
}

function buildOutputTouchstone(parsed, n, pairsConfig, outFmt) {
  const { comments, optionLine, inFmt, freqData } = parsed;
  const N = pairsConfig.length;

  const newOpt = optionLine.replace(new RegExp(`\\b${inFmt}\\b`, 'i'), outFmt);

  const outputLines = [
    ...comments,
    `! [Mixed-mode] Generated by Touchstone-MixedMode Tool`,
    `! Single-ended → Mixed-mode (balanced) S-parameter conversion`,
    `! Output port mapping:`,
    ...pairsConfig.map((p, i) =>
      `!   Port ${i + 1} [d${i + 1}]: differential, SE-port ${p.pos + 1}(+) / ${p.neg + 1}(-)`
    ),
    ...pairsConfig.map((p, i) =>
      `!   Port ${N + i + 1} [c${i + 1}]: common-mode,  SE-port ${p.pos + 1}(+) / ${p.neg + 1}(-)`
    ),
    newOpt,
  ];

  const M = buildM(pairsConfig, n);

  for (const { freq, pairs } of freqData) {
    const Sse  = pairsToMatrix(pairs, n, inFmt);
    const Smm  = mixedModeTransform(Sse, M, n);
    const outP = matrixToPairs(Smm, n, outFmt);

    if (n <= 2) {
      outputLines.push([String(freq), ...outP.flat().map(v => v.toExponential(6))].join('\t'));
    } else {
      for (let row = 0; row < n; row++) {
        const vals = outP.slice(row * n, (row + 1) * n).flat().map(v => v.toExponential(6));
        outputLines.push((row === 0 ? [String(freq), ...vals] : vals).join('\t'));
      }
    }
  }

  return outputLines.join('\n') + '\n';
}

// ── Validation ─────────────────────────────────────────────────────────────
function validatePairs(cfg, n) {
  const used = new Set();
  for (let i = 0; i < cfg.length; i++) {
    const { pos, neg } = cfg[i];
    if (pos === neg) return { ok: false, msg: `ペア ${i + 1}: 正端子と負端子が同じポートです (ポート ${pos + 1})` };
    if (used.has(pos)) return { ok: false, msg: `ポート ${pos + 1} が複数のペアで使われています` };
    if (used.has(neg)) return { ok: false, msg: `ポート ${neg + 1} が複数のペアで使われています` };
    used.add(pos);
    used.add(neg);
  }
  return { ok: true, msg: `${n} ポート → ${cfg.length} 差動ペア (d1…d${cfg.length}, c1…c${cfg.length})` };
}

// ── Port config UI ─────────────────────────────────────────────────────────
function buildPortSelect(pairs, n, role, defaultIdx) {
  const sel = document.createElement('select');
  sel.className = 'port-select';
  sel.dataset.role = role;
  for (let i = 0; i < n; i++) {
    const opt = document.createElement('option');
    opt.value = String(i);
    opt.textContent = `Port ${i + 1}`;
    if (i === defaultIdx) opt.selected = true;
    sel.appendChild(opt);
  }
  sel.addEventListener('change', onPairChange);
  return sel;
}

function buildPairRows(n) {
  const N = n / 2;
  pairBody.innerHTML = '';
  for (let i = 0; i < N; i++) {
    const tr = document.createElement('tr');

    // Differential port label
    const tdLabel = document.createElement('td');
    tdLabel.innerHTML = `<span class="pair-label pair-label-d">d${i + 1}</span>`;
    tr.appendChild(tdLabel);

    // Positive port
    const tdPos = document.createElement('td');
    const cellPos = document.createElement('div');
    cellPos.className = 'port-cell';
    cellPos.innerHTML = `<span class="port-sign port-sign-pos">+</span>`;
    cellPos.appendChild(buildPortSelect(null, n, 'pos', i));
    tdPos.appendChild(cellPos);
    tr.appendChild(tdPos);

    // Negative port
    const tdNeg = document.createElement('td');
    const cellNeg = document.createElement('div');
    cellNeg.className = 'port-cell';
    cellNeg.innerHTML = `<span class="port-sign port-sign-neg">−</span>`;
    cellNeg.appendChild(buildPortSelect(null, n, 'neg', N + i));
    tdNeg.appendChild(cellNeg);
    tr.appendChild(tdNeg);

    // Output port labels
    const tdOut = document.createElement('td');
    tdOut.innerHTML = `<span class="pair-output">→ Port ${i + 1} <span class="tag-d">d${i + 1}</span> / Port ${N + i + 1} <span class="tag-c">c${i + 1}</span></span>`;
    tr.appendChild(tdOut);

    pairBody.appendChild(tr);
  }
  onPairChange();
}

function applyPreset(type) {
  const n = portCount;
  const N = n / 2;
  const rows = pairBody.querySelectorAll('tr');
  rows.forEach((tr, i) => {
    const posEl = tr.querySelector('[data-role="pos"]');
    const negEl = tr.querySelector('[data-role="neg"]');
    if (type === 'split') {
      posEl.value = String(i);
      negEl.value = String(N + i);
    } else {
      posEl.value = String(2 * i);
      negEl.value = String(2 * i + 1);
    }
  });
  document.getElementById('presetSplit').classList.toggle('active', type === 'split');
  document.getElementById('presetAdjacent').classList.toggle('active', type === 'adjacent');
  onPairChange();
}

function onPairChange() {
  const cfg = getPairsConfig();
  const v = validatePairs(cfg, portCount);
  pairValidEl.textContent = v.msg;
  pairValidEl.className = `validation-msg ${v.ok ? 'validation-ok' : 'validation-error'}`;
  pairValidEl.hidden = false;
  convertBtn.disabled = !v.ok || !parsedData;

  // Reset result on config change
  convertedText = null;
  dlBtn.disabled = true;
  resultPanel.hidden = true;
}

// ── File loading ───────────────────────────────────────────────────────────
async function loadFile(file) {
  const n = TT.portCount(file.name);
  if (n % 2 !== 0 || n < 2 || n > 8) {
    showFileError(`ポート数 ${n} は非対応です。偶数ポート（2, 4, 6, 8）の Touchstone ファイルを使用してください。`);
    return;
  }

  let parsed;
  try {
    const text = await file.text();
    parsed = TT.parseTouchstone(text, n);
  } catch (err) {
    showFileError(err.message);
    return;
  }

  currentFile = file;
  parsedData  = parsed;
  portCount   = n;
  convertedText = null;

  // Show file info
  fileLoadedEl.innerHTML = `
    <span class="file-loaded-name">${TT.escHtml(file.name)}</span>
    <span class="file-loaded-meta">${n}ポート · ${parsed.freqData.length} 周波数点 · ${parsed.inFmt} · ${TT.fmt_size(file.size)}</span>
    <button class="clear-file-btn" id="clearFileBtn">✕</button>
  `;
  fileLoadedEl.className = 'file-loaded';
  fileLoadedEl.hidden = false;
  document.getElementById('clearFileBtn').addEventListener('click', clearFile);

  buildPairRows(n);
  applyPreset('split');

  portPanel.hidden   = false;
  formatPanel.hidden = false;
  resultPanel.hidden = true;
  dlBtn.disabled = true;
}

function showFileError(msg) {
  fileLoadedEl.innerHTML = `<span style="color:var(--error);font-size:0.8rem;font-family:var(--mono)">${TT.escHtml(msg)}</span>`;
  fileLoadedEl.className = '';
  fileLoadedEl.hidden = false;
}

function clearFile() {
  currentFile = parsedData = null;
  portCount = 0;
  convertedText = null;
  fileInput.value = '';
  fileLoadedEl.hidden = true;
  portPanel.hidden = formatPanel.hidden = resultPanel.hidden = true;
  convertBtn.disabled = dlBtn.disabled = true;
}

// ── Conversion ─────────────────────────────────────────────────────────────
convertBtn.addEventListener('click', () => {
  if (!parsedData) return;
  const cfg = getPairsConfig();
  const v = validatePairs(cfg, portCount);
  if (!v.ok) return;

  convertBtn.textContent = '変換中…';
  convertBtn.disabled = true;

  setTimeout(() => {
    try {
      convertedText = buildOutputTouchstone(parsedData, portCount, cfg, outputFmt);
      outputName    = currentFile.name.replace(/(\.[^.]+)$/, '_mm$1');
      showResult(cfg);
      dlBtn.disabled = false;
    } catch (err) {
      alert(`変換エラー: ${err.message}`);
    } finally {
      convertBtn.textContent = '変換する';
      convertBtn.disabled = false;
    }
  }, 0);
});

function showResult(cfg) {
  const N = cfg.length;
  const n = portCount;

  resultInfo.innerHTML = `
    <div class="result-card">
      <div class="result-card-label">入力</div>
      <div class="result-card-value">${TT.escHtml(currentFile.name)}</div>
    </div>
    <div class="result-card">
      <div class="result-card-label">出力ファイル名</div>
      <div class="result-card-value">${TT.escHtml(outputName)}</div>
    </div>
    <div class="result-card">
      <div class="result-card-label">差動ペア数</div>
      <div class="result-card-value">${N} ペア (${n} ポート)</div>
    </div>
    <div class="result-card">
      <div class="result-card-label">周波数点数</div>
      <div class="result-card-value">${parsedData.freqData.length} 点</div>
    </div>
  `;

  const rows = [
    ...cfg.map((p, i) => `
      <tr>
        <td>Port ${i + 1}</td>
        <td><span class="tag-d">差動 d${i + 1}</span></td>
        <td>SE-Port ${p.pos + 1}(+) / ${p.neg + 1}(−)</td>
      </tr>
    `),
    ...cfg.map((p, i) => `
      <tr>
        <td>Port ${N + i + 1}</td>
        <td><span class="tag-c">コモン c${i + 1}</span></td>
        <td>SE-Port ${p.pos + 1}(+) / ${p.neg + 1}(−)</td>
      </tr>
    `),
  ].join('');

  portMapWrap.innerHTML = `
    <table class="port-map-table">
      <thead><tr><th>出力ポート</th><th>モード</th><th>元のポート</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;

  resultPanel.hidden = false;
}

// ── Download ───────────────────────────────────────────────────────────────
dlBtn.addEventListener('click', () => {
  if (!convertedText || !outputName) return;
  const blob = new Blob([convertedText], { type: 'text/plain' });
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'), { href: url, download: outputName });
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
});

// ── Format buttons ─────────────────────────────────────────────────────────
document.querySelectorAll('.fmt-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    outputFmt = btn.dataset.fmt;
    document.querySelectorAll('.fmt-btn').forEach(b => b.classList.toggle('active', b === btn));
    fmtDesc.textContent = FORMAT_DESC[outputFmt];
    convertedText = null;
    dlBtn.disabled = true;
    resultPanel.hidden = true;
  });
});

// ── Presets ────────────────────────────────────────────────────────────────
document.getElementById('presetSplit').addEventListener('click', () => applyPreset('split'));
document.getElementById('presetAdjacent').addEventListener('click', () => applyPreset('adjacent'));

// ── File input ─────────────────────────────────────────────────────────────
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});

TT.setupDropZone(dropZone, files => {
  const snp = Array.from(files).find(f => /\.s\d+p$/i.test(f.name));
  if (snp) loadFile(snp);
});
</script>
</body>
</html>
