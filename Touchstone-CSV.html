<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Touchstone CSV Extractor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F5F4F1;
  --surface: #FDFCFA;
  --border: #D8D5CE;
  --border-mid: #BFBBAF;
  --text: #1C1B18;
  --text-muted: #6B6860;
  --text-faint: #9E9B93;
  --accent: #0A5C47;
  --accent-bg: #E1F5EE;
  --accent-mid: #1D9E75;
  --success: #1D9E75;
  --error: #993C1D;
  --error-bg: #FAECE7;
  --warning: #854F0B;
  --warning-bg: #FAEEDA;
  --mono: 'IBM Plex Mono', 'Cascadia Code', 'Menlo', monospace;
  --sans: 'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif;
  --radius: 6px;
  --radius-lg: 10px;
}

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 2rem 1rem;
}

.app {
  max-width: 860px;
  margin: 0 auto;
}

header {
  margin-bottom: 2rem;
  padding-bottom: 1.25rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: baseline;
  gap: 1rem;
}

.logo {
  font-family: var(--mono);
  font-size: 1.1rem;
  font-weight: 500;
  letter-spacing: -0.02em;
  color: var(--text);
}

.logo span { color: var(--accent-mid); }

.subtitle {
  font-size: 0.8125rem;
  color: var(--text-muted);
}

.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.25rem;
  margin-bottom: 1rem;
}

.panel-title {
  font-size: 0.6875rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 0.875rem;
}

/* Drop zone */
.drop-zone {
  border: 1.5px dashed var(--border-mid);
  border-radius: var(--radius);
  padding: 2rem;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  position: relative;
}

.drop-zone:hover, .drop-zone.drag-over {
  border-color: var(--accent-mid);
  background: var(--accent-bg);
}

.drop-zone input[type="file"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
  width: 100%;
  height: 100%;
}

.drop-icon {
  display: block;
  width: 32px;
  height: 32px;
  margin: 0 auto 0.75rem;
  color: var(--text-faint);
}

.drop-label {
  font-size: 0.875rem;
  color: var(--text-muted);
}

.drop-label strong { color: var(--accent); font-weight: 500; }

.drop-sub {
  font-size: 0.75rem;
  color: var(--text-faint);
  margin-top: 0.25rem;
  font-family: var(--mono);
}

/* File info */
.file-info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 0.75rem;
}

.info-cell {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0.625rem 0.875rem;
}

.info-label {
  font-size: 0.6375rem;
  font-weight: 600;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-bottom: 0.25rem;
}

.info-value {
  font-family: var(--mono);
  font-size: 0.8125rem;
  color: var(--text);
  word-break: break-all;
}

/* Channel grid */
.channel-controls {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 0.875rem;
}

.channel-grid {
  display: grid;
  gap: 0.5rem;
}

.channel-card {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0.625rem 0.75rem;
  background: var(--bg);
  transition: border-color 0.12s, background 0.12s;
  cursor: pointer;
  user-select: none;
}

.channel-card:hover { border-color: var(--border-mid); }

.channel-card.selected {
  border-color: var(--accent-mid);
  background: var(--accent-bg);
}

.channel-card.previewing {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-bg);
}

.channel-header {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 0.375rem;
}

.channel-check {
  width: 14px;
  height: 14px;
  accent-color: var(--accent);
  cursor: pointer;
  flex-shrink: 0;
}

.channel-name {
  font-family: var(--mono);
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--text);
}

.channel-actions {
  display: flex;
  gap: 0.3rem;
}

.channel-preview-btn,
.channel-dl-btn {
  flex: 1;
  font-family: var(--mono);
  font-size: 0.6375rem;
  padding: 0.2rem 0;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: var(--surface);
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.12s;
}

.channel-preview-btn:hover {
  border-color: var(--accent-mid);
  color: var(--accent);
  background: var(--accent-bg);
}

.channel-dl-btn:hover {
  border-color: #4A7C59;
  color: #0A5C47;
  background: #E1F5EE;
}

.channel-card.previewing .channel-preview-btn {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-bg);
}

/* Preview panel */
.preview-wrap {
  position: relative;
}

.preview-title {
  font-family: var(--mono);
  font-size: 0.8125rem;
  font-weight: 500;
  color: var(--text-muted);
  margin-bottom: 0.75rem;
}

.preview-canvas-wrap {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--surface);
}

canvas#previewCanvas {
  display: block;
  width: 100%;
  height: auto;
}

.preview-empty {
  text-align: center;
  padding: 2.5rem;
  color: var(--text-faint);
  font-size: 0.8125rem;
}

/* Action bar */
.action-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
}

.stats {
  font-size: 0.75rem;
  color: var(--text-muted);
  font-family: var(--mono);
}

.btn-group { display: flex; gap: 0.5rem; }

.btn {
  font-family: var(--sans);
  font-size: 0.8125rem;
  font-weight: 500;
  padding: 0.5rem 1.1rem;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.12s;
  border: 1px solid;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.btn-primary:hover { background: #0A4F3E; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-secondary {
  background: var(--surface);
  color: var(--text);
  border-color: var(--border);
}
.btn-secondary:hover { border-color: var(--border-mid); background: var(--bg); }
.btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-sm {
  font-size: 0.75rem;
  padding: 0.3rem 0.75rem;
}

.hidden { display: none !important; }

.error-banner {
  background: var(--error-bg);
  border: 1px solid #E8B4A4;
  border-radius: var(--radius);
  padding: 0.75rem 1rem;
  font-size: 0.8125rem;
  color: var(--error);
  font-family: var(--mono);
}
</style>
</head>
<body>
<div class="app">

<header>
  <div class="logo">Touchstone<span>·</span>CSV</div>
  <div class="subtitle">S-パラメータ チャンネル別 CSV 書き出しツール（1〜9 ポート対応）</div>
</header>

<div class="panel">
  <div class="panel-title">Input</div>
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".s1p,.s2p,.s3p,.s4p,.s5p,.s6p,.s7p,.s8p,.s9p">
    <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    <div class="drop-label"><strong>クリックまたはドロップ</strong>して Touchstone ファイルを読み込む</div>
    <div class="drop-sub">RI / DB / MA フォーマットの .s1p〜.s9p（1 ファイル）</div>
  </div>
  <div id="errorBanner" class="error-banner hidden" style="margin-top:0.75rem;"></div>
</div>

<div class="panel hidden" id="infoPanel">
  <div class="panel-title">File Info</div>
  <div class="file-info-grid" id="fileInfoGrid"></div>
</div>

<div class="panel hidden" id="channelPanel">
  <div class="panel-title">Channels</div>
  <div class="channel-controls">
    <button class="btn btn-secondary btn-sm" id="selectAllBtn">すべて選択</button>
    <button class="btn btn-secondary btn-sm" id="selectNoneBtn">すべて解除</button>
  </div>
  <div class="channel-grid" id="channelGrid"></div>
</div>

<div class="panel hidden" id="previewPanel">
  <div class="panel-title">Preview</div>
  <div class="preview-wrap">
    <div class="preview-title" id="previewTitle">—</div>
    <div class="preview-canvas-wrap">
      <canvas id="previewCanvas" width="800" height="300"></canvas>
    </div>
  </div>
</div>

<div class="action-bar">
  <span class="stats" id="statsLabel"></span>
  <div class="btn-group">
    <button class="btn btn-secondary" id="clearBtn" disabled>クリア</button>
    <button class="btn btn-primary" id="dlZipBtn" disabled>ZIP でダウンロード</button>
  </div>
</div>

</div>

<script>
// ── Minimal ZIP writer ─────────────────────────────────────────────────────
(function() {
  const CRC_TABLE = new Uint32Array(256);
  for (let i = 0; i < 256; i++) {
    let c = i;
    for (let j = 0; j < 8; j++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
    CRC_TABLE[i] = c;
  }
  function crc32(bytes) {
    let crc = 0xFFFFFFFF;
    for (let i = 0; i < bytes.length; i++) crc = CRC_TABLE[(crc ^ bytes[i]) & 0xFF] ^ (crc >>> 8);
    return (crc ^ 0xFFFFFFFF) >>> 0;
  }
  function u16le(v) { return [(v & 0xFF), (v >> 8) & 0xFF]; }
  function u32le(v) { return [v & 0xFF, (v >> 8) & 0xFF, (v >> 16) & 0xFF, (v >> 24) & 0xFF]; }
  window.buildZip = function(files) {
    const enc = new TextEncoder();
    const parts = [];
    const central = [];
    let offset = 0;
    for (const f of files) {
      const name = enc.encode(f.name);
      const data = enc.encode(f.data);
      const crc  = crc32(data);
      const sz   = data.length;
      const lh   = new Uint8Array([
        0x50,0x4B,0x03,0x04, ...u16le(20), ...u16le(0), ...u16le(0),
        ...u16le(0), ...u16le(0), ...u32le(crc),
        ...u32le(sz), ...u32le(sz), ...u16le(name.length), ...u16le(0),
        ...name,
      ]);
      central.push({ name, crc, sz, offset });
      parts.push(lh, data);
      offset += lh.length + data.length;
    }
    const cdStart = offset;
    const cds = central.map(({ name, crc, sz, offset: off }) =>
      new Uint8Array([
        0x50,0x4B,0x01,0x02, ...u16le(20), ...u16le(20), ...u16le(0), ...u16le(0),
        ...u16le(0), ...u16le(0), ...u32le(crc),
        ...u32le(sz), ...u32le(sz), ...u16le(name.length),
        ...u16le(0), ...u16le(0), ...u16le(0), ...u16le(0), ...u32le(0), ...u32le(off),
        ...name,
      ])
    );
    const cdSize = cds.reduce((s, c) => s + c.length, 0);
    const eocd = new Uint8Array([
      0x50,0x4B,0x05,0x06, ...u16le(0), ...u16le(0),
      ...u16le(central.length), ...u16le(central.length),
      ...u32le(cdSize), ...u32le(cdStart), ...u16le(0),
    ]);
    const all = [...parts, ...cds, eocd];
    const total = all.reduce((s, a) => s + a.length, 0);
    const buf = new Uint8Array(total);
    let pos = 0;
    for (const a of all) { buf.set(a, pos); pos += a.length; }
    return buf;
  };
})();
</script>

<script type="module">
// ── State ──────────────────────────────────────────────────────────────────
let parsed   = null;  // { comments, optionLine, inFmt, freqData, n, basename, freqUnit }
let selected = new Set();
let previewKey = null;

// ── DOM refs ───────────────────────────────────────────────────────────────
const dropZone     = document.getElementById('dropZone');
const fileInput    = document.getElementById('fileInput');
const errorBanner  = document.getElementById('errorBanner');
const infoPanel    = document.getElementById('infoPanel');
const channelPanel = document.getElementById('channelPanel');
const previewPanel = document.getElementById('previewPanel');
const fileInfoGrid = document.getElementById('fileInfoGrid');
const channelGrid  = document.getElementById('channelGrid');
const previewTitle = document.getElementById('previewTitle');
const previewCanvas = document.getElementById('previewCanvas');
const statsLabel   = document.getElementById('statsLabel');
const dlZipBtn     = document.getElementById('dlZipBtn');
const clearBtn     = document.getElementById('clearBtn');
const selectAllBtn = document.getElementById('selectAllBtn');
const selectNoneBtn = document.getElementById('selectNoneBtn');

// ── Touchstone parsing ─────────────────────────────────────────────────────
function portCount(filename) {
  const m = filename.match(/\.s(\d+)p$/i);
  if (!m) throw new Error(`不明な拡張子: ${filename}`);
  return parseInt(m[1], 10);
}

function detectFmt(optionLine) {
  const tokens = optionLine.toUpperCase().split(/\s+/);
  for (const t of ['RI', 'DB', 'MA']) {
    if (tokens.includes(t)) return t;
  }
  throw new Error(`不明なフォーマット: ${optionLine}`);
}

function detectFreqUnit(optionLine) {
  const tokens = optionLine.toUpperCase().split(/\s+/);
  const map = { GHZ: 'GHz', MHZ: 'MHz', KHZ: 'kHz', HZ: 'Hz' };
  for (const t of ['GHZ', 'MHZ', 'KHZ', 'HZ']) {
    if (tokens.includes(t)) return map[t];
  }
  return 'Hz';
}

function parseTouchstone(content, n) {
  const nPairs = n * n;
  const valsPerFreq = 1 + 2 * nPairs;
  const comments = [];
  let optionLine = null;
  const rawVals = [];

  for (const raw of content.split(/\r?\n/)) {
    const stripped = raw.replace(/!.*$/, '').trim();
    if (raw.trimStart().startsWith('!')) { comments.push(raw.replace(/[\r\n]+$/, '')); continue; }
    if (!stripped) continue;
    if (stripped.startsWith('#')) { optionLine = stripped; continue; }
    for (const tok of stripped.split(/[\t ]+/)) {
      if (tok !== '') rawVals.push(parseFloat(tok));
    }
  }

  if (!optionLine) throw new Error('オプション行が見つかりません');
  if (rawVals.length % valsPerFreq !== 0) {
    throw new Error(`値数不正: ${rawVals.length} 値 (N=${n}, 期待: ${valsPerFreq} の倍数)`);
  }
  const inFmt = detectFmt(optionLine);
  const freqUnit = detectFreqUnit(optionLine);
  const freqData = [];
  for (let i = 0; i < rawVals.length; i += valsPerFreq) {
    const pairs = [];
    for (let j = 0; j < nPairs; j++) {
      pairs.push([rawVals[i + 1 + j * 2], rawVals[i + 2 + j * 2]]);
    }
    freqData.push({ freq: rawVals[i], pairs });
  }
  return { comments, optionLine, inFmt, freqUnit, freqData };
}

// ── CSV builder ────────────────────────────────────────────────────────────
function colHeaders(inFmt, key) {
  const sij = `S${key}`;
  if (inFmt === 'RI') return [`Re[${sij}]`, `Im[${sij}]`];
  if (inFmt === 'DB') return [`dB[${sij}]`, `Phase[deg][${sij}]`];
  return [`Mag[${sij}]`, `Phase[deg][${sij}]`];
}

function buildChannelCSV(i, j) {
  const { comments, optionLine, inFmt, freqUnit, freqData, n } = parsed;
  const key = `${i + 1}${j + 1}`;
  const pairIdx = i * n + j;
  const [colA, colB] = colHeaders(inFmt, key);

  const lines = [
    ...comments,
    optionLine,
    `Freq[${freqUnit}],${colA},${colB}`,
  ];

  for (const { freq, pairs } of freqData) {
    const [a, b] = pairs[pairIdx];
    lines.push(`${freq},${a},${b}`);
  }
  return lines.join('\r\n') + '\r\n';
}

// ── Utilities ──────────────────────────────────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmt_size(bytes) {
  if (bytes < 1024) return `${bytes} B`;
  if (bytes < 1048576) return `${(bytes / 1024).toFixed(1)} KB`;
  return `${(bytes / 1048576).toFixed(1)} MB`;
}

function keyToIJ(key) {
  // key is e.g. "11", "12", "21" — always 2 chars for ≤9 ports
  return { i: parseInt(key[0], 10) - 1, j: parseInt(key[1], 10) - 1 };
}

// ── Canvas chart ───────────────────────────────────────────────────────────
function drawChart(key) {
  const { freqData, inFmt, freqUnit, n } = parsed;
  const { i, j } = keyToIJ(key);
  const pairIdx = i * n + j;

  const freqs = freqData.map(d => d.freq);
  const vals  = freqData.map(d => d.pairs[pairIdx][0]);

  const ctx = previewCanvas.getContext('2d');
  const W = previewCanvas.width;
  const H = previewCanvas.height;

  const PAD = { top: 28, right: 24, bottom: 46, left: 62 };
  const plotW = W - PAD.left - PAD.right;
  const plotH = H - PAD.top - PAD.bottom;

  // Clear
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--surface').trim() || '#FDFCFA';
  ctx.fillRect(0, 0, W, H);

  const minF = freqs[0], maxF = freqs[freqs.length - 1];
  let minV = Math.min(...vals), maxV = Math.max(...vals);
  if (minV === maxV) { minV -= 1; maxV += 1; }
  const padV = (maxV - minV) * 0.08;
  minV -= padV; maxV += padV;

  const sx = f => PAD.left + (f - minF) / (maxF - minF) * plotW;
  const sy = v => PAD.top  + (1 - (v - minV) / (maxV - minV)) * plotH;

  // Grid lines
  const GRID_COLOR = '#D8D5CE';
  const TEXT_COLOR = '#9E9B93';
  ctx.strokeStyle = GRID_COLOR;
  ctx.lineWidth = 1;
  ctx.font = `11px 'IBM Plex Mono', monospace`;
  ctx.fillStyle = TEXT_COLOR;
  ctx.textAlign = 'right';

  const yTicks = 5;
  for (let t = 0; t <= yTicks; t++) {
    const v = minV + (maxV - minV) * (t / yTicks);
    const y = sy(v);
    ctx.beginPath();
    ctx.moveTo(PAD.left, y);
    ctx.lineTo(PAD.left + plotW, y);
    ctx.setLineDash([3, 3]);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillText(v.toFixed(2), PAD.left - 6, y + 4);
  }

  const xTicks = Math.min(6, freqs.length - 1);
  ctx.textAlign = 'center';
  for (let t = 0; t <= xTicks; t++) {
    const f = minF + (maxF - minF) * (t / xTicks);
    const x = sx(f);
    ctx.beginPath();
    ctx.moveTo(x, PAD.top);
    ctx.lineTo(x, PAD.top + plotH);
    ctx.setLineDash([3, 3]);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = TEXT_COLOR;
    ctx.fillText(f.toFixed(3), x, PAD.top + plotH + 16);
  }

  // Axes
  ctx.strokeStyle = '#BFBBAF';
  ctx.lineWidth = 1;
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.rect(PAD.left, PAD.top, plotW, plotH);
  ctx.stroke();

  // Line
  ctx.beginPath();
  ctx.strokeStyle = '#1D9E75';
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  for (let k = 0; k < freqs.length; k++) {
    const x = sx(freqs[k]);
    const y = sy(vals[k]);
    k === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Axis labels
  const [colA] = colHeaders(inFmt, key);
  ctx.fillStyle = '#6B6860';
  ctx.font = `11px 'IBM Plex Mono', monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(`Freq [${freqUnit}]`, PAD.left + plotW / 2, H - 6);

  ctx.save();
  ctx.translate(14, PAD.top + plotH / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText(colA, 0, 0);
  ctx.restore();

  // Title
  ctx.fillStyle = '#1C1B18';
  ctx.font = `500 12px 'IBM Plex Mono', monospace`;
  ctx.textAlign = 'left';
  ctx.fillText(`S${key}`, PAD.left, 18);
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderInfoPanel() {
  const { n, inFmt, freqUnit, freqData, basename } = parsed;
  fileInfoGrid.innerHTML = [
    { label: 'ファイル名', value: basename },
    { label: 'ポート数',   value: `${n} ポート` },
    { label: 'フォーマット', value: inFmt },
    { label: '周波数単位', value: freqUnit },
    { label: '周波数点数', value: `${freqData.length} 点` },
    { label: 'チャンネル数', value: `${n * n} ch` },
  ].map(({ label, value }) => `
    <div class="info-cell">
      <div class="info-label">${escHtml(label)}</div>
      <div class="info-value">${escHtml(String(value))}</div>
    </div>
  `).join('');
}

function renderChannelGrid() {
  const { n } = parsed;
  channelGrid.style.gridTemplateColumns = `repeat(${n}, 1fr)`;
  let html = '';
  for (let i = 0; i < n; i++) {
    for (let j = 0; j < n; j++) {
      const key = `${i + 1}${j + 1}`;
      const isSel  = selected.has(key);
      const isPrev = previewKey === key;
      html += `
        <div class="channel-card${isSel ? ' selected' : ''}${isPrev ? ' previewing' : ''}" data-key="${key}">
          <div class="channel-header">
            <input type="checkbox" class="channel-check" data-key="${key}" ${isSel ? 'checked' : ''}>
            <span class="channel-name">S${escHtml(key)}</span>
          </div>
          <div class="channel-actions">
            <button class="channel-preview-btn" data-key="${key}">グラフ</button>
            <button class="channel-dl-btn" data-key="${key}">CSV</button>
          </div>
        </div>
      `;
    }
  }
  channelGrid.innerHTML = html;

  channelGrid.querySelectorAll('.channel-check').forEach(cb => {
    cb.addEventListener('change', e => {
      e.stopPropagation();
      const k = cb.dataset.key;
      cb.checked ? selected.add(k) : selected.delete(k);
      renderChannelGrid();
      renderStats();
    });
  });

  channelGrid.querySelectorAll('.channel-preview-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const k = btn.dataset.key;
      previewKey = k;
      previewPanel.classList.remove('hidden');
      previewTitle.textContent = `S${k} — ${colHeaders(parsed.inFmt, k).join('  /  ')}`;
      drawChart(k);
      renderChannelGrid();
    });
  });

  channelGrid.querySelectorAll('.channel-dl-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const k = btn.dataset.key;
      const { i, j } = keyToIJ(k);
      const csv = buildChannelCSV(i, j);
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = Object.assign(document.createElement('a'), {
        href: url,
        download: `S${k}_${parsed.basename}.csv`,
      });
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 2000);
    });
  });

  channelGrid.querySelectorAll('.channel-card').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.classList.contains('channel-check') || e.target.classList.contains('channel-preview-btn') || e.target.classList.contains('channel-dl-btn')) return;
      const k = card.dataset.key;
      const cb = card.querySelector('.channel-check');
      if (selected.has(k)) { selected.delete(k); cb.checked = false; }
      else { selected.add(k); cb.checked = true; }
      card.classList.toggle('selected', selected.has(k));
      renderStats();
    });
  });
}

function renderStats() {
  const total = parsed ? parsed.n * parsed.n : 0;
  statsLabel.textContent = parsed
    ? `${total} チャンネル · 選択中 ${selected.size}`
    : '';
  dlZipBtn.disabled = selected.size === 0;
}

function showError(msg) {
  errorBanner.textContent = msg;
  errorBanner.classList.remove('hidden');
}

function hideError() {
  errorBanner.classList.add('hidden');
}

// ── Load file ──────────────────────────────────────────────────────────────
async function loadFile(file) {
  hideError();
  try {
    const n    = portCount(file.name);
    const text = await file.text();
    const data = parseTouchstone(text, n);
    const basename = file.name.replace(/\.s\d+p$/i, '');

    parsed     = { ...data, n, basename };
    selected   = new Set();
    previewKey = null;

    renderInfoPanel();
    renderChannelGrid();
    renderStats();

    infoPanel.classList.remove('hidden');
    channelPanel.classList.remove('hidden');
    previewPanel.classList.add('hidden');
    clearBtn.disabled = false;
    dlZipBtn.disabled = true;
  } catch (err) {
    showError(err.message);
  }
}

// ── Actions ────────────────────────────────────────────────────────────────
selectAllBtn.addEventListener('click', () => {
  if (!parsed) return;
  const { n } = parsed;
  for (let i = 0; i < n; i++)
    for (let j = 0; j < n; j++)
      selected.add(`${i + 1}${j + 1}`);
  renderChannelGrid();
  renderStats();
});

selectNoneBtn.addEventListener('click', () => {
  selected.clear();
  renderChannelGrid();
  renderStats();
});

clearBtn.addEventListener('click', () => {
  parsed     = null;
  selected   = new Set();
  previewKey = null;
  fileInput.value = '';
  hideError();
  infoPanel.classList.add('hidden');
  channelPanel.classList.add('hidden');
  previewPanel.classList.add('hidden');
  statsLabel.textContent = '';
  dlZipBtn.disabled = true;
  clearBtn.disabled = true;
});

dlZipBtn.addEventListener('click', () => {
  if (!parsed || selected.size === 0) return;

  dlZipBtn.disabled = true;
  dlZipBtn.textContent = '生成中…';

  const files = [];
  for (const key of [...selected].sort()) {
    const { i, j } = keyToIJ(key);
    files.push({
      name: `${key}_${parsed.basename}.csv`,
      data: buildChannelCSV(i, j),
    });
  }

  const zipBytes = buildZip(files);
  const blob = new Blob([zipBytes], { type: 'application/zip' });
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'), {
    href: url,
    download: `${parsed.basename}_CSV.zip`,
  });
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 2000);

  dlZipBtn.disabled = selected.size === 0;
  dlZipBtn.textContent = 'ZIP でダウンロード';
});

// ── File input ─────────────────────────────────────────────────────────────
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const snpFiles = Array.from(e.dataTransfer.files).filter(f => /\.s\d+p$/i.test(f.name));
  if (snpFiles[0]) loadFile(snpFiles[0]);
});

// ── Canvas resize ──────────────────────────────────────────────────────────
const resizeObserver = new ResizeObserver(() => {
  if (previewKey && parsed) drawChart(previewKey);
});
resizeObserver.observe(previewCanvas.parentElement);
</script>
</body>
</html>
