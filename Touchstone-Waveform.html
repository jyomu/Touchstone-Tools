<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Touchstone Waveform Analyzer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="lib/shared.css">
<style>
body { padding: 1.25rem 1rem 2rem; }

.app { max-width: 1300px; margin: 0 auto; }

header {
  display: flex;
  align-items: baseline;
  gap: 1rem;
  margin-bottom: 1.25rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}

.logo {
  font-family: var(--mono);
  font-size: 1.05rem;
  font-weight: 500;
  letter-spacing: -0.02em;
}
.logo span { color: var(--accent-mid); }

.back-link {
  margin-left: auto;
  font-size: 0.8rem;
  color: var(--accent);
  text-decoration: none;
  font-family: var(--mono);
}
.back-link:hover { text-decoration: underline; }

/* Layout */
.workspace {
  display: grid;
  grid-template-columns: 252px 1fr;
  gap: 1rem;
  align-items: start;
}

@media (max-width: 760px) {
  .workspace { grid-template-columns: 1fr; }
  .sidebar { order: 2; }
  .chart-area { order: 1; }
}

/* Sidebar */
.sidebar { display: flex; flex-direction: column; gap: 0.625rem; }

.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 0.875rem;
}

.panel-title {
  font-size: 0.625rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-bottom: 0.625rem;
}

/* Drop zone */
.drop-zone {
  border: 1.5px dashed var(--border-mid);
  border-radius: var(--radius);
  padding: 1rem;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  position: relative;
}
.drop-label { font-size: 0.8rem; color: var(--text-muted); }
.drop-sub { font-size: 0.7rem; color: var(--text-faint); margin-top: 0.2rem; font-family: var(--mono); }

/* File list */
.file-list { display: flex; flex-direction: column; gap: 4px; }

.file-row {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 4px 2px;
  border-radius: 4px;
}
.file-row:hover { background: var(--bg); }

.file-color {
  width: 18px; height: 18px;
  border-radius: 3px;
  border: 1px solid var(--border);
  cursor: pointer;
  padding: 0;
  flex-shrink: 0;
}

.file-name {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--text);
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.file-name.hidden { opacity: 0.4; }

.icon-btn {
  font-size: 0.75rem;
  padding: 2px 5px;
  border: 1px solid transparent;
  border-radius: 3px;
  background: transparent;
  color: var(--text-faint);
  cursor: pointer;
  flex-shrink: 0;
  line-height: 1;
  transition: all 0.12s;
}
.icon-btn:hover { background: var(--bg); color: var(--text); border-color: var(--border); }
.icon-btn.remove:hover { background: var(--error-bg); color: var(--error); }

.empty-msg { font-size: 0.75rem; color: var(--text-faint); text-align: center; padding: 0.5rem 0; }

/* S-param grid */
.sparm-grid {
  display: grid;
  gap: 3px;
  max-height: 180px;
  overflow-y: auto;
}
.sp-item {
  display: flex;
  align-items: center;
  gap: 3px;
  cursor: pointer;
  white-space: nowrap;
}
.sp-item input { cursor: pointer; margin: 0; width: 12px; height: 12px; flex-shrink: 0; }
.sp-item label {
  font-family: var(--mono);
  font-size: 0.7rem;
  cursor: pointer;
  color: var(--text-muted);
}
.sp-item input:checked + label { color: var(--text); font-weight: 500; }

.sparm-actions {
  display: flex;
  gap: 4px;
  margin-top: 6px;
}

/* Button groups */
.btn-row { display: flex; flex-wrap: wrap; gap: 4px; }

.seg-btn {
  font-family: var(--mono);
  font-size: 0.7rem;
  font-weight: 500;
  padding: 0.25rem 0.6rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.12s;
  white-space: nowrap;
}
.seg-btn:hover { border-color: var(--accent-mid); color: var(--accent); }
.seg-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.toggle-row {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-top: 6px;
}
.toggle-label { font-size: 0.75rem; color: var(--text-muted); }

/* BW panel */
.bw-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
.bw-label { font-size: 0.75rem; color: var(--text-muted); flex-shrink: 0; }
.bw-select {
  font-family: var(--mono);
  font-size: 0.7rem;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--surface);
  color: var(--text);
  padding: 2px 4px;
  flex: 1;
  min-width: 0;
}
.bw-input {
  font-family: var(--mono);
  font-size: 0.7rem;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--surface);
  color: var(--text);
  padding: 2px 4px;
  width: 52px;
}
.bw-result {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-top: 4px;
  line-height: 1.6;
}
.bw-result .bw-val { color: var(--text); font-weight: 500; }
.bw-result .bw-err { color: var(--error); }

/* Export */
.export-row { display: flex; gap: 6px; flex-wrap: wrap; }

/* Chart area */
.chart-area { display: flex; flex-direction: column; gap: 0.625rem; }

.canvas-wrap {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  background: var(--surface);
  position: relative;
}
#mainCanvas, #subCanvas {
  display: block;
  width: 100%;
  height: 240px;
  cursor: crosshair;
}
#mainCanvas.panning, #subCanvas.panning { cursor: grab; }
#mainCanvas.grabbing, #subCanvas.grabbing { cursor: grabbing; }
#subCanvas { border-top: 1px solid var(--border); }

.status-bar {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--text-muted);
  padding: 0.3rem 0.75rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  min-height: 1.8rem;
  display: flex;
  align-items: center;
  gap: 1rem;
}

/* Marker panel */
.marker-grid {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 3px 10px;
  font-family: var(--mono);
  font-size: 0.7rem;
  align-items: start;
}
.mk-label { color: var(--text-faint); white-space: nowrap; }
.mk-val { color: var(--text); line-height: 1.5; }
.mk-val .mk-row { display: flex; gap: 8px; flex-wrap: wrap; }
.mk-row span { white-space: nowrap; }
.mk-delta { color: var(--accent); }
.mk-slot-btn {
  font-family: var(--mono);
  font-size: 0.65rem;
  padding: 1px 5px;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: var(--surface);
  color: var(--text-faint);
  cursor: pointer;
}
.mk-slot-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.mk-controls { display: flex; gap: 4px; margin-bottom: 6px; align-items: center; }
.mk-hint { font-size: 0.7rem; color: var(--text-faint); margin-left: auto; }

/* Stats panel */
.stats-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--mono);
  font-size: 0.7rem;
}
.stats-table th {
  font-size: 0.6rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-faint);
  text-align: left;
  padding: 0 4px 4px;
  border-bottom: 1px solid var(--border);
  font-weight: 600;
}
.stats-table td {
  padding: 3px 4px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
.stats-table tr:last-child td { border-bottom: none; }
.stats-table .c-swatch {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 2px;
  margin-right: 4px;
  vertical-align: middle;
}

/* Generic buttons */
.btn {
  font-family: var(--sans);
  font-size: 0.775rem;
  font-weight: 500;
  padding: 0.35rem 0.875rem;
  border-radius: var(--radius);
  cursor: pointer;
  border: 1px solid;
  transition: all 0.12s;
}
.btn-sm { font-size: 0.7rem; padding: 0.2rem 0.55rem; }
.btn:disabled { opacity: 0.38; cursor: not-allowed; }

/* Error banner */
.err-banner {
  font-size: 0.75rem;
  font-family: var(--mono);
  background: var(--error-bg);
  color: var(--error);
  border: 1px solid #e8c4b8;
  border-radius: var(--radius);
  padding: 0.4rem 0.75rem;
  margin-top: -2px;
  display: none;
}
.err-banner.show { display: block; }
</style>
</head>
<body>
<div class="app">

<header>
  <div class="logo">Touchstone<span>·</span>Waveform</div>
  <div class="subtitle">Sパラメータ波形解析ツール（DB / MA / RI · スミスチャート · 1〜9ポート対応）</div>
  <a class="back-link" href="index.html">← Tools</a>
</header>

<div class="workspace">

<!-- ─── SIDEBAR ─────────────────────────────────────────────── -->
<aside class="sidebar">

  <!-- Drop zone -->
  <div class="panel">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" multiple
        accept=".s1p,.s2p,.s3p,.s4p,.s5p,.s6p,.s7p,.s8p,.s9p">
      <div class="drop-label"><strong>クリックまたはドロップ</strong></div>
      <div class="drop-sub">.s1p〜.s9p（複数可・重ね表示）</div>
    </div>
  </div>

  <!-- File list -->
  <div class="panel" id="fileListPanel">
    <div class="panel-title">ファイル</div>
    <div class="file-list" id="fileList">
      <div class="empty-msg">ファイルなし</div>
    </div>
  </div>

  <!-- S-param selection -->
  <div class="panel" id="sparmPanel">
    <div class="panel-title">Sパラメータ</div>
    <div class="sparm-grid" id="sparmGrid">
      <div class="empty-msg">ファイルを読み込んでください</div>
    </div>
    <div class="sparm-actions" id="sparmActions" style="display:none">
      <button class="btn btn-secondary btn-sm" id="sparmAllBtn">全選択</button>
      <button class="btn btn-secondary btn-sm" id="sparmNoneBtn">全解除</button>
    </div>
  </div>

  <!-- Display options -->
  <div class="panel">
    <div class="panel-title">表示フォーマット</div>
    <div class="btn-row" id="fmtBtns">
      <button class="seg-btn active" data-fmt="DB">DB</button>
      <button class="seg-btn" data-fmt="MA">MA</button>
      <button class="seg-btn" data-fmt="RI">RI</button>
    </div>
    <div class="panel-title" style="margin-top:0.625rem">グラフ種別</div>
    <div class="btn-row" id="graphBtns">
      <button class="seg-btn active" data-graph="linear">線形</button>
      <button class="seg-btn" data-graph="log">対数</button>
      <button class="seg-btn" data-graph="smith">スミス</button>
    </div>
    <div class="panel-title" style="margin-top:0.625rem">位相オプション</div>
    <div class="sp-item">
      <input type="checkbox" id="phaseUnwrapChk" checked>
      <label for="phaseUnwrapChk">位相アンラップ (UW)</label>
    </div>
  </div>

  <!-- Frequency range -->
  <div class="panel">
    <div class="panel-title">周波数範囲</div>
    <div class="bw-row">
      <span class="bw-label">Start</span>
      <input class="bw-input" type="number" id="freqStartVal" min="0" step="any" style="width:64px">
      <select class="bw-select" id="freqStartUnit" style="width:50px;flex:none">
        <option value="Hz">Hz</option>
        <option value="kHz">kHz</option>
        <option value="MHz">MHz</option>
        <option value="GHz">GHz</option>
      </select>
    </div>
    <div class="bw-row">
      <span class="bw-label">Stop&nbsp;</span>
      <input class="bw-input" type="number" id="freqStopVal" min="0" step="any" style="width:64px">
      <select class="bw-select" id="freqStopUnit" style="width:50px;flex:none">
        <option value="Hz">Hz</option>
        <option value="kHz">kHz</option>
        <option value="MHz">MHz</option>
        <option value="GHz">GHz</option>
      </select>
    </div>
    <div class="bw-row" style="margin-bottom:0">
      <button class="btn btn-secondary btn-sm" id="freqRangeResetBtn">全範囲</button>
    </div>
  </div>

  <!-- BW detection -->
  <div class="panel">
    <div class="panel-title">帯域幅検出 <span style="font-weight:400;text-transform:none;letter-spacing:0">(BPF用)</span></div>
    <div class="bw-row">
      <span class="bw-label">トレース</span>
      <select class="bw-select" id="bwTrace"></select>
    </div>
    <div class="bw-row">
      <span class="bw-label">レベル</span>
      <input class="bw-input" type="number" id="bwLevel" value="-3" step="0.5">
      <span class="bw-label">dB</span>
      <button class="btn btn-secondary btn-sm" id="bwRunBtn">検出</button>
    </div>
    <div class="bw-result" id="bwResult">—</div>
  </div>

  <!-- Export -->
  <div class="panel">
    <div class="panel-title">エクスポート</div>
    <div class="export-row">
      <button class="btn btn-secondary btn-sm" id="exportPngBtn">PNG 保存</button>
      <button class="btn btn-secondary btn-sm" id="exportCsvBtn">CSV 保存</button>
    </div>
  </div>

</aside>

<!-- ─── CHART AREA ────────────────────────────────────────────── -->
<main class="chart-area">

  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="mainCanvas"></canvas>
    <canvas id="subCanvas"></canvas>
  </div>

  <div class="err-banner" id="errBanner"></div>

  <div class="status-bar" id="statusBar">
    <span id="hoverReadout">周波数軸にカーソルを合わせると値を表示します</span>
  </div>

  <!-- Marker panel -->
  <div class="panel" id="markerPanel">
    <div class="panel-title">マーカー</div>
    <div class="mk-controls">
      <button class="mk-slot-btn active" id="mkSlot0Btn">M1</button>
      <button class="mk-slot-btn" id="mkSlot1Btn">M2</button>
      <button class="btn btn-secondary btn-sm" id="mkClearBtn">クリア</button>
      <span class="mk-hint">グラフをクリックして配置</span>
    </div>
    <div class="marker-grid" id="markerGrid">
      <span class="mk-label">M1</span><span class="mk-val" id="mkVal0">—</span>
      <span class="mk-label">M2</span><span class="mk-val" id="mkVal1">—</span>
      <span class="mk-label">Δ</span><span class="mk-val mk-delta" id="mkDelta">—</span>
    </div>
  </div>

  <!-- Stats panel -->
  <div class="panel" id="statsPanel">
    <div class="panel-title">統計</div>
    <div id="statsContent">
      <div class="empty-msg">トレースなし</div>
    </div>
  </div>

</main>
</div><!-- .workspace -->
</div><!-- .app -->

<script src="lib/zip.js"></script>
<script src="lib/touchstone.js"></script>
<script src="lib/ui-helpers.js"></script>
<script type="module">

// ── Constants ──────────────────────────────────────────────────────────────
const PALETTE = ['#1D9E75','#E07B4A','#4A7CB5','#C94F7C','#7A5EA7','#B5A34A','#4AB5A3','#A34A4A'];
const SPARM_DASHES = [
  [],                   // 実線
  [6, 3],               // 長破線
  [2, 3],               // 点線
  [8, 3, 2, 3],         // 一点鎖線
  [12, 3],              // 超長破線
  [2, 3, 8, 3],         // 点・長破線
  [4, 2, 4, 2, 2, 2],   // 複合1
  [8, 2, 2, 2],         // 二点鎖線
  [14, 3],              // 極長破線
  [3, 3],               // 中点線
  [8, 3, 2, 3, 2, 3],   // 二点長鎖線
  [10, 2, 2, 2, 2, 2],  // 複合2
];

function getSparmDash(key) {
  const sorted = [...viewState.visibleParams].sort((a, b) => {
    const ai = parseInt(a[0]), aj = parseInt(a[a.length - 1]);
    const bi = parseInt(b[0]), bj = parseInt(b[b.length - 1]);
    return (ai * 10 + aj) - (bi * 10 + bj);
  });
  const idx = sorted.indexOf(key);
  return SPARM_DASHES[idx >= 0 ? idx % SPARM_DASHES.length : 0];
}

const PAD = { left: 60, right: 16, top: 20, bottom: 44 };
const SMITH_PAD = 28;
const FMT_UPPER_LABEL = { DB: 'dB', MA: '振幅', RI: '実部' };
const FMT_LOWER_LABEL = { DB: '位相(UW) [°]', MA: '位相(UW) [°]', RI: '虚部' };
const FMT_UPPER_UNIT  = { DB: 'dB', MA: '', RI: '' };
const FMT_LOWER_UNIT  = { DB: '°', MA: '°', RI: '' };

// ── State ──────────────────────────────────────────────────────────────────
let files       = [];
let nextId      = 0;
let nextColor   = 0;
let viewState   = {
  displayFormat: 'DB',    // 'DB' | 'MA' | 'RI'
  graphType:     'linear', // 'linear' | 'log' | 'smith'
  zoom:        { fMin: null, fMax: null },
  markers:     [null, null],
  activeSlot:  0,
  visibleParams: new Set(['11']),
  phaseUnwrap: true,
};
let drag = null;    // { startX, startFMin, startFMax }
let wasDragging = false;
let dpr = window.devicePixelRatio || 1;

// ── DOM refs ───────────────────────────────────────────────────────────────
const canvas      = document.getElementById('mainCanvas');
const ctx         = canvas.getContext('2d');
const subCanvas   = document.getElementById('subCanvas');
const subCtx      = subCanvas.getContext('2d');
const canvasWrap  = document.getElementById('canvasWrap');
const fileList    = document.getElementById('fileList');
const sparmGrid   = document.getElementById('sparmGrid');
const sparmActions= document.getElementById('sparmActions');
const bwTrace     = document.getElementById('bwTrace');
const bwResult    = document.getElementById('bwResult');
const errBanner   = document.getElementById('errBanner');
const hoverReadout= document.getElementById('hoverReadout');
const mkVal0      = document.getElementById('mkVal0');
const mkVal1      = document.getElementById('mkVal1');
const mkDelta     = document.getElementById('mkDelta');
const statsContent= document.getElementById('statsContent');
const mkSlot0Btn      = document.getElementById('mkSlot0Btn');
const mkSlot1Btn      = document.getElementById('mkSlot1Btn');
const freqStartValEl  = document.getElementById('freqStartVal');
const freqStartUnitEl = document.getElementById('freqStartUnit');
const freqStopValEl   = document.getElementById('freqStopVal');
const freqStopUnitEl  = document.getElementById('freqStopUnit');

// ── Math helpers ───────────────────────────────────────────────────────────
function toHz(freq, freqUnit) {
  const m = { Hz: 1, kHz: 1e3, MHz: 1e6, GHz: 1e9 };
  return freq * (m[freqUnit] ?? 1);
}

function unwrapPhase(phaseDeg) {
  const out = new Float64Array(phaseDeg.length);
  out[0] = phaseDeg[0];
  for (let i = 1; i < phaseDeg.length; i++) {
    let d = phaseDeg[i] - out[i - 1];
    while (d >  180) d -= 360;
    while (d < -180) d += 360;
    out[i] = out[i - 1] + d;
  }
  return out;
}

function bestUnit(hz) {
  if (hz >= 1e9) return 'GHz';
  if (hz >= 1e6) return 'MHz';
  if (hz >= 1e3) return 'kHz';
  return 'Hz';
}
function hzToUnit(hz, unit) { return hz / toHz(1, unit); }
function syncFreqRangeInputs() {
  if (!files.some(f => f.visible)) {
    freqStartValEl.value = '';
    freqStopValEl.value  = '';
    freqStartValEl.removeAttribute('min'); freqStartValEl.removeAttribute('max');
    freqStopValEl.removeAttribute('min');  freqStopValEl.removeAttribute('max');
    return;
  }
  const { fMin, fMax } = getFreqRange();
  const { fMin: gMin, fMax: gMax } = getGlobalFreqRange();
  if (freqStartValEl.value === '') freqStartUnitEl.value = bestUnit(gMin);
  if (freqStopValEl.value  === '') freqStopUnitEl.value  = bestUnit(gMax);
  const su = freqStartUnitEl.value;
  const eu = freqStopUnitEl.value;
  freqStartValEl.value = +hzToUnit(fMin, su).toPrecision(6);
  freqStopValEl.value  = +hzToUnit(fMax, eu).toPrecision(6);
  freqStartValEl.min = +hzToUnit(gMin, su).toPrecision(6);
  freqStartValEl.max = +hzToUnit(gMax, su).toPrecision(6);
  freqStopValEl.min  = +hzToUnit(gMin, eu).toPrecision(6);
  freqStopValEl.max  = +hzToUnit(gMax, eu).toPrecision(6);
}


function nearestIdx(arr, v) {
  if (!arr.length) return -1;
  let best = 0, bestD = Math.abs(arr[0] - v);
  for (let i = 1; i < arr.length; i++) {
    const d = Math.abs(arr[i] - v);
    if (d < bestD) { bestD = d; best = i; }
  }
  return best;
}

// ── Format helpers ─────────────────────────────────────────────────────────
function formatFreq(hz) {
  if (hz >= 1e9) return `${+(hz / 1e9).toPrecision(6)} GHz`;
  if (hz >= 1e6) return `${+(hz / 1e6).toPrecision(6)} MHz`;
  if (hz >= 1e3) return `${+(hz / 1e3).toPrecision(6)} kHz`;
  return `${+hz.toPrecision(6)} Hz`;
}

function formatVal(v, unit) {
  if (!isFinite(v)) return '—';
  return `${v.toFixed(3)}${unit ? ' ' + unit : ''}`;
}

function formatBW(hz) {
  if (hz >= 1e9) return `${(hz / 1e9).toFixed(4)} GHz`;
  if (hz >= 1e6) return `${(hz / 1e6).toFixed(4)} MHz`;
  if (hz >= 1e3) return `${(hz / 1e3).toFixed(4)} kHz`;
  return `${hz.toFixed(2)} Hz`;
}

function niceTicks(min, max, maxCount) {
  const range   = max - min;
  if (range <= 0) return [min];
  const rough   = range / maxCount;
  const mag     = Math.pow(10, Math.floor(Math.log10(rough)));
  const steps   = [1, 2, 2.5, 5, 10];
  let step = mag;
  for (const s of steps) {
    step = s * mag;
    if (range / step <= maxCount + 0.5) break;
  }
  const ticks = [];
  const start = Math.ceil(min / step) * step;
  for (let t = start; t <= max + step * 1e-6; t += step) {
    const r = parseFloat(t.toPrecision(10));
    if (r >= min - step * 1e-6 && r <= max + step * 1e-6) ticks.push(r);
  }
  return ticks;
}

function logFreqTicks(fMin, fMax) {
  const ticks   = [];
  const decMin  = Math.floor(Math.log10(fMin));
  const decMax  = Math.ceil(Math.log10(fMax));
  const subs    = fMax / fMin > 100 ? [1, 2, 5] : [1, 2, 3, 5, 7];
  for (let d = decMin; d <= decMax; d++) {
    for (const m of subs) {
      const f = m * Math.pow(10, d);
      if (f >= fMin * 0.9999 && f <= fMax * 1.0001) ticks.push(f);
    }
  }
  return ticks.length ? ticks : niceTicks(fMin, fMax, 6);
}

// ── Compute traces ─────────────────────────────────────────────────────────
function computeForKey(fileEntry, i, j) {
  const { parsed, n } = fileEntry;
  const { inFmt, freqUnit, freqData } = parsed;
  const pairIdx = (i - 1) * n + (j - 1);
  const N       = freqData.length;
  const freqHz  = new Float64Array(N);
  const real    = new Float64Array(N);
  const imag    = new Float64Array(N);
  const db      = new Float64Array(N);
  const mag     = new Float64Array(N);
  const rawPhase= new Float64Array(N);

  for (let k = 0; k < N; k++) {
    freqHz[k]   = toHz(freqData[k].freq, freqUnit);
    const [a, b]= freqData[k].pairs[pairIdx];
    const [re, im] = TT.toRI(a, b, inFmt);
    real[k] = re; imag[k] = im;
    mag[k]      = Math.sqrt(re * re + im * im);
    db[k]       = mag[k] === 0 ? -999 : 20 * Math.log10(mag[k]);
    rawPhase[k] = Math.atan2(im, re) * 180 / Math.PI;
  }

  const phase = unwrapPhase(rawPhase);
  return { key: `${i}${j}`, freqHz, db, mag, phase, rawPhase, real, imag };
}

function computeTraces(fileEntry) {
  fileEntry.computed = new Map();
  for (let i = 1; i <= fileEntry.n; i++) {
    for (let j = 1; j <= fileEntry.n; j++) {
      const key = `${i}${j}`;
      fileEntry.computed.set(key, computeForKey(fileEntry, i, j));
    }
  }
}

// ── Mode helpers ────────────────────────────────────────────────────────────
function isSmithMode() { return viewState.graphType === 'smith'; }
function isLogScale()  { return viewState.graphType === 'log'; }
function getUpperArray(computed) {
  if (viewState.displayFormat === 'DB') return computed.db;
  if (viewState.displayFormat === 'MA') return computed.mag;
  return computed.real;
}
function getLowerArray(computed) {
  if (viewState.displayFormat === 'RI') return computed.imag;
  return viewState.phaseUnwrap ? computed.phase : computed.rawPhase;
}
function getUpperLabel() { return FMT_UPPER_LABEL[viewState.displayFormat]; }
function getLowerLabel() {
  if (viewState.displayFormat === 'RI') return FMT_LOWER_LABEL['RI'];
  return viewState.phaseUnwrap ? '位相(UW) [°]' : '位相 [°]';
}
function getUpperUnit()  { return FMT_UPPER_UNIT[viewState.displayFormat]; }
function getLowerUnit()  { return FMT_LOWER_UNIT[viewState.displayFormat]; }

function getVisibleTraces() {
  const result = [];
  for (const fe of files) {
    if (!fe.visible) continue;
    for (const key of viewState.visibleParams) {
      if (fe.computed.has(key)) {
        result.push({ fileEntry: fe, key, computed: fe.computed.get(key) });
      }
    }
  }
  return result;
}

function getGlobalFreqRange() {
  const traces = getVisibleTraces();
  if (!traces.length) return { fMin: 1e6, fMax: 6e9 };
  let fMin = Infinity, fMax = -Infinity;
  for (const { computed } of traces) {
    if (computed.freqHz[0] < fMin) fMin = computed.freqHz[0];
    const last = computed.freqHz[computed.freqHz.length - 1];
    if (last > fMax) fMax = last;
  }
  return { fMin, fMax };
}

function getFreqRange() {
  const g = getGlobalFreqRange();
  return {
    fMin: viewState.zoom.fMin ?? g.fMin,
    fMax: viewState.zoom.fMax ?? g.fMax,
  };
}

function getYRange(traces, getArr, skipLow) {
  let yMin =  Infinity, yMax = -Infinity;
  const { fMin, fMax } = getFreqRange();
  for (const { computed } of traces) {
    const arr = getArr(computed);
    const fHz = computed.freqHz;
    for (let i = 0; i < arr.length; i++) {
      if (fHz[i] < fMin || fHz[i] > fMax) continue;
      const v = arr[i];
      if (!isFinite(v)) continue;
      if (skipLow && v < -200) continue;
      if (v < yMin) yMin = v;
      if (v > yMax) yMax = v;
    }
  }
  if (!isFinite(yMin)) { yMin = -60; yMax = 0; }
  if (yMin === yMax)   { yMin -= 5; yMax += 5; }
  const pad = (yMax - yMin) * 0.1;
  return { yMin: yMin - pad, yMax: yMax + pad };
}

// ── Canvas coordinate transforms ───────────────────────────────────────────
function plotDims(c) {
  return {
    W: c.clientWidth,
    H: c.clientHeight,
    plotW: c.clientWidth  - PAD.left - PAD.right,
    plotH: c.clientHeight - PAD.top  - PAD.bottom,
  };
}

function fToX(f, fMin, fMax, plotW, logScale) {
  if (logScale) {
    const lMin = Math.log10(fMin), lMax = Math.log10(fMax);
    return PAD.left + (Math.log10(f) - lMin) / (lMax - lMin) * plotW;
  }
  return PAD.left + (f - fMin) / (fMax - fMin) * plotW;
}

function xToF(x, fMin, fMax, plotW, logScale) {
  const t = (x - PAD.left) / plotW;
  if (logScale) {
    const lMin = Math.log10(fMin), lMax = Math.log10(fMax);
    return Math.pow(10, lMin + t * (lMax - lMin));
  }
  return fMin + t * (fMax - fMin);
}

function vToY(v, yMin, yMax, plotH) {
  return PAD.top + (1 - (v - yMin) / (yMax - yMin)) * plotH;
}

// ── Draw: rectangular chart ────────────────────────────────────────────────
function drawRect(c, cx, getArr, yLabel, skipLow) {
  const { W, H, plotW, plotH } = plotDims(c);
  cx.save();
  cx.scale(dpr, dpr);
  cx.clearRect(0, 0, W, H);

  const traces = getVisibleTraces();
  const { fMin, fMax } = getFreqRange();
  const { yMin, yMax } = getYRange(traces, getArr, skipLow);
  const log = isLogScale() && fMin > 0;

  // Background
  cx.fillStyle = '#FDFCFA';
  cx.fillRect(0, 0, W, H);
  cx.fillStyle = '#F9F8F5';
  cx.fillRect(PAD.left, PAD.top, plotW, plotH);

  // Grid
  cx.strokeStyle = '#E4E2DC';
  cx.lineWidth = 1;

  const xTicks = log ? logFreqTicks(fMin, fMax) : niceTicks(fMin, fMax, 7);
  for (const f of xTicks) {
    const x = fToX(f, fMin, fMax, plotW, log);
    if (x < PAD.left - 1 || x > PAD.left + plotW + 1) continue;
    cx.beginPath(); cx.moveTo(x, PAD.top); cx.lineTo(x, PAD.top + plotH); cx.stroke();
  }

  const yTicks = niceTicks(yMin, yMax, 6);
  for (const v of yTicks) {
    const y = vToY(v, yMin, yMax, plotH);
    if (y < PAD.top - 1 || y > PAD.top + plotH + 1) continue;
    cx.beginPath(); cx.moveTo(PAD.left, y); cx.lineTo(PAD.left + plotW, y); cx.stroke();
  }

  // Axes border
  cx.strokeStyle = '#BFBBAF';
  cx.lineWidth   = 1;
  cx.strokeRect(PAD.left, PAD.top, plotW, plotH);

  // Tick labels: X axis
  cx.fillStyle   = '#6B6860';
  cx.font        = `${11 * Math.min(1, W / 600)}px 'IBM Plex Mono', monospace`;
  cx.textAlign   = 'center';
  cx.textBaseline= 'top';
  for (const f of xTicks) {
    const x = fToX(f, fMin, fMax, plotW, log);
    if (x < PAD.left - 1 || x > PAD.left + plotW + 1) continue;
    cx.fillText(formatFreq(f), x, PAD.top + plotH + 5);
  }

  // Y-axis label
  cx.save();
  cx.translate(12, PAD.top + plotH / 2);
  cx.rotate(-Math.PI / 2);
  cx.textAlign = 'center';
  cx.textBaseline = 'middle';
  cx.fillStyle = '#9E9B93';
  cx.font = `10px 'IBM Plex Mono', monospace`;
  cx.fillText(yLabel, 0, 0);
  cx.restore();

  // Tick labels: Y axis
  cx.textAlign   = 'right';
  cx.textBaseline= 'middle';
  cx.font = `11px 'IBM Plex Mono', monospace`;
  for (const v of yTicks) {
    const y = vToY(v, yMin, yMax, plotH);
    if (y < PAD.top - 1 || y > PAD.top + plotH + 1) continue;
    cx.fillText(v.toString(), PAD.left - 5, y);
  }

  // Traces
  cx.save();
  cx.beginPath();
  cx.rect(PAD.left, PAD.top, plotW, plotH);
  cx.clip();

  for (const { fileEntry, key, computed } of traces) {
    const arr = getArr(computed);
    const fHz = computed.freqHz;
    cx.beginPath();
    cx.strokeStyle = fileEntry.color;
    cx.lineWidth   = 1.75;
    cx.lineJoin    = 'round';
    cx.setLineDash(getSparmDash(key));
    let started = false;
    for (let i = 0; i < fHz.length; i++) {
      const f = fHz[i];
      const v = arr[i];
      if (!isFinite(v)) { started = false; continue; }
      if (skipLow && v < -300) { started = false; continue; }
      const x = fToX(f, fMin, fMax, plotW, log);
      const y = vToY(v, yMin, yMax, plotH);
      if (!started) { cx.moveTo(x, y); started = true; }
      else cx.lineTo(x, y);
    }
    cx.stroke();
    cx.setLineDash([]);
  }
  cx.restore();

  // Markers
  const mColors = ['#E07B4A', '#4A7CB5'];
  for (let slot = 0; slot < 2; slot++) {
    const mk = viewState.markers[slot];
    if (!mk) continue;
    const x = fToX(mk.freqHz, fMin, fMax, plotW, log);
    if (x < PAD.left || x > PAD.left + plotW) continue;
    cx.save();
    cx.strokeStyle = mColors[slot];
    cx.lineWidth   = 1.5;
    if (slot === 1) { cx.setLineDash([4, 3]); }
    cx.beginPath();
    cx.moveTo(x, PAD.top);
    cx.lineTo(x, PAD.top + plotH);
    cx.stroke();

    for (const { computed, fileEntry } of traces) {
      const arr  = getArr(computed);
      const idx  = nearestIdx(computed.freqHz, mk.freqHz);
      const v    = arr[idx];
      if (!isFinite(v) || (skipLow && v < -300)) continue;
      const y    = vToY(v, yMin, yMax, plotH);
      if (y < PAD.top || y > PAD.top + plotH) continue;
      cx.beginPath();
      cx.arc(x, y, 4, 0, 2 * Math.PI);
      cx.fillStyle   = fileEntry.color;
      cx.fill();
      cx.strokeStyle = '#fff';
      cx.lineWidth   = 1.5;
      cx.stroke();
    }

    cx.fillStyle   = mColors[slot];
    cx.font        = `bold 10px 'IBM Plex Mono', monospace`;
    cx.textBaseline= 'bottom';
    const label     = `M${slot + 1}: ${formatFreq(mk.freqHz)}`;
    const lw        = cx.measureText(label).width;
    const lx        = Math.min(x + 4, PAD.left + plotW - lw - 4);
    cx.fillText(label, lx, PAD.top + 14);
    cx.restore();
  }

  // Legend (upper chart only)
  if (traces.length && c === canvas) {
    const items = traces.map(t => ({
      label: `${t.fileEntry.name.replace(/\.s\d+p$/i,'').slice(-12)} S${t.key}`,
      color: t.fileEntry.color,
      dash:  getSparmDash(t.key),
    }));
    const lFont   = '10px \'IBM Plex Mono\', monospace';
    cx.font      = lFont;
    const lPad    = 6, lH = 16, lSwW = 18;
    const lMaxW   = items.reduce((m, it) => Math.max(m, cx.measureText(it.label).width), 0);
    const lBoxW   = lMaxW + lSwW + lPad * 3;
    const lBoxH   = items.length * lH + lPad * 2;
    const lX      = PAD.left + plotW - lBoxW - 6;
    const lY      = PAD.top + 6;

    cx.fillStyle   = 'rgba(253,252,250,0.88)';
    cx.strokeStyle = '#D8D5CE';
    cx.lineWidth   = 0.75;
    cx.setLineDash([]);
    cx.beginPath();
    cx.roundRect(lX, lY, lBoxW, lBoxH, 4);
    cx.fill();
    cx.stroke();

    items.forEach((it, idx) => {
      const iy = lY + lPad + idx * lH + lH / 2;
      cx.save();
      cx.strokeStyle = it.color;
      cx.lineWidth   = 2;
      cx.setLineDash(it.dash);
      cx.beginPath();
      cx.moveTo(lX + lPad, iy);
      cx.lineTo(lX + lPad + lSwW, iy);
      cx.stroke();
      cx.restore();
      cx.fillStyle   = '#1C1B18';
      cx.textAlign   = 'left';
      cx.textBaseline= 'middle';
      cx.fillText(it.label, lX + lPad + lSwW + 4, iy);
    });
  }

  // Empty state
  if (!traces.length && c === canvas) {
    cx.fillStyle   = '#9E9B93';
    cx.font        = `14px 'IBM Plex Sans', sans-serif`;
    cx.textAlign   = 'center';
    cx.textBaseline= 'middle';
    cx.fillText('ファイルを読み込んでください', W / 2, H / 2);
  }

  cx.restore();
}

// ── Draw: Smith chart ──────────────────────────────────────────────────────
function drawSmith() {
  const W  = canvas.clientWidth;
  const H  = canvas.clientHeight;
  ctx.save();
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#FDFCFA';
  ctx.fillRect(0, 0, W, H);

  const R  = Math.min(W, H) / 2 - SMITH_PAD;
  const cx = W / 2;
  const cy = H / 2;

  function gToXY(re, im) {
    return { x: cx + re * R, y: cy - im * R };
  }

  // Unit circle fill
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, 2 * Math.PI);
  ctx.fillStyle = '#F9F8F5';
  ctx.fill();

  // Clip to unit disk for constant-X arcs
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, 2 * Math.PI);
  ctx.clip();

  ctx.lineWidth = 0.7;
  // Constant-X arcs
  const xVals = [0.2, 0.5, 1, 2, 5];
  for (const xv of xVals) {
    for (const sign of [1, -1]) {
      const xn    = sign * xv;
      const arcCx = cx + R;            // Γ_re=1 → rightmost
      const arcCy = cy - (1 / xn) * R;
      const arcR  = Math.abs(1 / xn) * R;
      ctx.beginPath();
      ctx.arc(arcCx, arcCy, arcR, 0, 2 * Math.PI);
      ctx.strokeStyle = sign > 0 ? 'rgba(74,124,181,0.45)' : 'rgba(201,79,124,0.45)';
      ctx.stroke();
    }
  }
  ctx.restore();

  // Constant-R circles
  const rVals = [0, 0.2, 0.5, 1, 2, 5];
  for (const rv of rVals) {
    const circCx = cx + (rv / (rv + 1)) * R;
    const circCy = cy;
    const circR  = (1 / (rv + 1)) * R;
    ctx.beginPath();
    ctx.arc(circCx, circCy, circR, 0, 2 * Math.PI);
    ctx.strokeStyle = '#BFBBAF';
    ctx.lineWidth   = rv === 0 ? 1.5 : 0.8;
    ctx.stroke();

    // Label
    if (rv > 0) {
      const labelX = circCx + circR + 3;
      const labelY = circCy;
      ctx.fillStyle   = '#9E9B93';
      ctx.font        = '9px \'IBM Plex Mono\', monospace';
      ctx.textAlign   = 'left';
      ctx.textBaseline= 'middle';
      ctx.fillText(rv.toString(), labelX, labelY);
    }
  }

  // Axes
  ctx.strokeStyle = '#BFBBAF';
  ctx.lineWidth   = 1;
  ctx.beginPath(); ctx.moveTo(cx - R, cy); ctx.lineTo(cx + R, cy); ctx.stroke();

  // Landmark labels
  ctx.font = '10px \'IBM Plex Mono\', monospace';
  ctx.fillStyle = '#9E9B93';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText('∞ (開放)', cx + R, cy + 4);
  ctx.textAlign = 'center';
  ctx.fillText('0 (短絡)', cx - R - 2, cy + 4);
  ctx.fillText('整合', cx, cy - 10);

  // Traces (Γ plane = S-param in RI)
  const traces = getVisibleTraces();
  const { fMin: smFMin, fMax: smFMax } = getFreqRange();
  let hasOffDiag = false;
  for (const { fileEntry, key, computed } of traces) {
    const { real, imag, freqHz } = computed;
    const isDiag = key.length === 2 && key[0] === key[1];
    if (!isDiag) hasOffDiag = true;
    ctx.save();
    ctx.beginPath();
    ctx.strokeStyle = fileEntry.color;
    ctx.lineWidth   = isDiag ? 1.75 : 1.25;
    ctx.globalAlpha = isDiag ? 1 : 0.5;
    if (!isDiag) ctx.setLineDash([5, 3]);
    ctx.lineJoin    = 'round';
    let firstIdx = -1;
    for (let i = 0; i < real.length; i++) {
      if (freqHz[i] < smFMin || freqHz[i] > smFMax) continue;
      const { x, y } = gToXY(real[i], imag[i]);
      if (firstIdx < 0) { firstIdx = i; ctx.moveTo(x, y); }
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.restore();
    if (firstIdx >= 0) {
      const s = gToXY(real[firstIdx], imag[firstIdx]);
      ctx.beginPath(); ctx.arc(s.x, s.y, 3, 0, 2 * Math.PI);
      ctx.fillStyle = isDiag ? fileEntry.color : 'transparent';
      ctx.strokeStyle = fileEntry.color;
      ctx.lineWidth = 1;
      ctx.fill(); ctx.stroke();
    }
  }

  // Off-diagonal warning note
  if (hasOffDiag) {
    ctx.fillStyle = '#854F0B';
    ctx.font = '9px \'IBM Plex Mono\', monospace';
    ctx.textAlign = 'right'; ctx.textBaseline = 'bottom';
    ctx.fillText('破線: Sij (i≠j) は参考表示', W - 8, H - 8);
  }

  // Smith markers
  const mColors = ['#E07B4A', '#4A7CB5'];
  for (let slot = 0; slot < 2; slot++) {
    const mk = viewState.markers[slot];
    if (!mk) continue;
    for (const { fileEntry, computed } of traces) {
      const idx = nearestIdx(computed.freqHz, mk.freqHz);
      const { x, y } = gToXY(computed.real[idx], computed.imag[idx]);
      ctx.beginPath(); ctx.arc(x, y, 5, 0, 2 * Math.PI);
      ctx.fillStyle   = mColors[slot];
      ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
    }
  }

  // Title
  ctx.fillStyle = '#9E9B93';
  ctx.font = '11px \'IBM Plex Sans\', sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
  ctx.fillText('スミスチャート（Γ平面）', 8, H - 8);

  ctx.restore();
}

function updateCanvasLayout() {
  if (isSmithMode()) {
    canvas.style.height = '480px';
    subCanvas.style.display = 'none';
  } else {
    canvas.style.height = '240px';
    subCanvas.style.display = '';
  }
  dpr = window.devicePixelRatio || 1;
  canvas.width  = Math.round(canvas.clientWidth  * dpr);
  canvas.height = Math.round(canvas.clientHeight * dpr);
  subCanvas.width  = Math.round(subCanvas.clientWidth  * dpr);
  subCanvas.height = Math.round(subCanvas.clientHeight * dpr);
}

function redraw() {
  if (isSmithMode()) {
    drawSmith();
  } else {
    const isDb = viewState.displayFormat === 'DB';
    drawRect(canvas, ctx, getUpperArray, getUpperLabel(), isDb);
    drawRect(subCanvas, subCtx, getLowerArray, getLowerLabel(), false);
  }
  updateStatsPanel();
  syncFreqRangeInputs();
}

// ── Markers ────────────────────────────────────────────────────────────────
function pixelToSnappedFreq(px) {
  const traces = getVisibleTraces();
  if (!traces.length) return null;
  const { fMin, fMax } = getFreqRange();
  const { plotW }      = plotDims(canvas);
  const f              = xToF(px, fMin, fMax, plotW, isLogScale());
  // Snap to the nearest data point across all visible traces
  let bestFreq = null, bestDist = Infinity;
  for (const { computed } of traces) {
    const idx = nearestIdx(computed.freqHz, f);
    if (idx < 0) continue;
    const dist = Math.abs(computed.freqHz[idx] - f);
    if (dist < bestDist) { bestDist = dist; bestFreq = computed.freqHz[idx]; }
  }
  return bestFreq;
}

function getMarkerDisplay(mk) {
  if (!mk) return '—';
  const traces = getVisibleTraces();
  if (!traces.length) return formatFreq(mk.freqHz);
  const parts = [`<span>${formatFreq(mk.freqHz)}</span>`];
  for (const { fileEntry, key, computed } of traces) {
    const idx  = nearestIdx(computed.freqHz, mk.freqHz);
    if (idx < 0) continue;
    const name = fileEntry.name.replace(/\.s\d+p$/i, '').slice(-10);
    let valStr;
    if (isSmithMode()) {
      const mag   = Math.sqrt(computed.real[idx] ** 2 + computed.imag[idx] ** 2);
      const phase = Math.atan2(computed.imag[idx], computed.real[idx]) * 180 / Math.PI;
      valStr = `|Γ|=${mag.toFixed(4)} ∠${phase.toFixed(2)}°`;
    } else {
      const uv = getUpperArray(computed)[idx];
      const lv = getLowerArray(computed)[idx];
      valStr = `${formatVal(uv, getUpperUnit())} / ${formatVal(lv, getLowerUnit())}`;
    }
    parts.push(`<span style="color:${fileEntry.color}">${name} S${key}: ${valStr}</span>`);
  }
  return `<div class="mk-row">${parts.join('')}</div>`;
}

function updateMarkerPanel() {
  const [m0, m1] = viewState.markers;
  mkVal0.innerHTML = getMarkerDisplay(m0);
  mkVal1.innerHTML = getMarkerDisplay(m1);

  if (m0 && m1) {
    const df  = Math.abs(m1.freqHz - m0.freqHz);
    const traces = getVisibleTraces();
    let dValStr = '';
    if (traces.length && !isSmithMode()) {
      const { computed } = traces[0];
      const arr  = getUpperArray(computed);
      const i0 = nearestIdx(computed.freqHz, m0.freqHz);
      const i1 = nearestIdx(computed.freqHz, m1.freqHz);
      if (i0 >= 0 && i1 >= 0) {
        const v0 = arr[i0], v1 = arr[i1];
        if (isFinite(v0) && isFinite(v1)) {
          dValStr = `  ΔY: ${formatVal(v1 - v0, getUpperUnit())}`;
        }
      }
    }
    mkDelta.innerHTML = `<span>ΔF: ${formatFreq(df)}${dValStr}</span>`;
  } else {
    mkDelta.innerHTML = '—';
  }
}

function updateStatsPanel() {
  const traces = getVisibleTraces();
  if (!traces.length) {
    statsContent.innerHTML = '<div class="empty-msg">トレースなし</div>';
    return;
  }
  const { fMin, fMax } = getFreqRange();

  if (isSmithMode()) {
    const rows = traces.map(({ fileEntry, key, computed }) => {
      const { real, imag, freqHz } = computed;
      let magMin = Infinity, magMax = -Infinity, peakF = 0, minF = 0;
      for (let i = 0; i < freqHz.length; i++) {
        if (freqHz[i] < fMin || freqHz[i] > fMax) continue;
        const mag = Math.sqrt(real[i] * real[i] + imag[i] * imag[i]);
        if (mag > magMax) { magMax = mag; peakF = freqHz[i]; }
        if (mag < magMin) { magMin = mag; minF  = freqHz[i]; }
      }
      const rlMax = isFinite(magMax) && magMax > 0 ? (20 * Math.log10(magMax)).toFixed(3) + ' dB' : '—';
      const rlMin = isFinite(magMin) && magMin > 0 ? (20 * Math.log10(magMin)).toFixed(3) + ' dB' : '—';
      const name  = fileEntry.name.replace(/\.s\d+p$/i, '').slice(-14);
      return `<tr>
        <td><span class="c-swatch" style="background:${fileEntry.color}"></span>${TT.escHtml(name)} S${key}</td>
        <td>${isFinite(magMax) ? magMax.toFixed(4) : '—'}</td>
        <td>${rlMax}</td>
        <td>${isFinite(magMax) ? formatFreq(peakF) : '—'}</td>
        <td>${isFinite(magMin) ? magMin.toFixed(4) : '—'}</td>
        <td>${rlMin}</td>
        <td>${isFinite(magMin) ? formatFreq(minF) : '—'}</td>
      </tr>`;
    }).join('');
    statsContent.innerHTML = `<table class="stats-table">
      <thead><tr><th>トレース</th><th>|Γ|max</th><th>[dB]</th><th>周波数</th><th>|Γ|min</th><th>[dB]</th><th>周波数</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
    return;
  }

  const skipLow = viewState.displayFormat === 'DB';
  const unit    = getUpperUnit();
  const label   = getUpperLabel();
  const rows = traces.map(({ fileEntry, key, computed }) => {
    const arr  = getUpperArray(computed);
    const fHz  = computed.freqHz;
    let vMin =  Infinity, vMax = -Infinity, peakF = 0, minF = 0;
    for (let i = 0; i < arr.length; i++) {
      if (fHz[i] < fMin || fHz[i] > fMax) continue;
      const v = arr[i];
      if (!isFinite(v) || (skipLow && v < -300)) continue;
      if (v > vMax) { vMax = v; peakF = fHz[i]; }
      if (v < vMin) { vMin = v; minF  = fHz[i]; }
    }
    const name = fileEntry.name.replace(/\.s\d+p$/i, '').slice(-14);
    return `<tr>
      <td><span class="c-swatch" style="background:${fileEntry.color}"></span>${TT.escHtml(name)} S${key}</td>
      <td>${isFinite(vMax) ? formatVal(vMax, unit) : '—'}</td>
      <td>${isFinite(vMax) ? formatFreq(peakF) : '—'}</td>
      <td>${isFinite(vMin) ? formatVal(vMin, unit) : '—'}</td>
      <td>${isFinite(vMin) ? formatFreq(minF) : '—'}</td>
    </tr>`;
  }).join('');
  statsContent.innerHTML = `<table class="stats-table">
    <thead><tr><th>トレース</th><th>${label} 最大</th><th>周波数</th><th>${label} 最小</th><th>周波数</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ── BW detection ───────────────────────────────────────────────────────────
function findBandwidth(computed, dbLevel) {
  const { freqHz, db } = computed;
  const N = freqHz.length;
  if (N < 3) return null;
  let peakIdx = 0;
  for (let i = 1; i < N; i++) { if (db[i] > db[peakIdx]) peakIdx = i; }
  const threshold = db[peakIdx] + dbLevel;

  // Warn if peak is at an edge (LPF/HPF など BPF 以外の可能性)
  const edgeWarning = peakIdx < 2 || peakIdx > N - 3
    ? 'ピークが測定端にあります。LPF/HPF には正確な帯域幅を算出できない場合があります。' : null;

  let loIdx = peakIdx;
  while (loIdx > 0 && db[loIdx] >= threshold) loIdx--;
  let hiIdx = peakIdx;
  while (hiIdx < N - 1 && db[hiIdx] >= threshold) hiIdx++;

  let fLo, fHi;
  if (loIdx === peakIdx || (loIdx === 0 && db[0] >= threshold)) {
    fLo = freqHz[0];
  } else {
    const t = (threshold - db[loIdx]) / (db[loIdx + 1] - db[loIdx]);
    fLo = freqHz[loIdx] + t * (freqHz[loIdx + 1] - freqHz[loIdx]);
  }
  if (hiIdx === peakIdx || (hiIdx === N - 1 && db[N - 1] >= threshold)) {
    fHi = freqHz[N - 1];
  } else {
    const t = (threshold - db[hiIdx - 1]) / (db[hiIdx] - db[hiIdx - 1]);
    fHi = freqHz[hiIdx - 1] + t * (freqHz[hiIdx] - freqHz[hiIdx - 1]);
  }
  return { fLow: fLo, fHigh: fHi, bw: fHi - fLo,
           peakDb: db[peakIdx], peakFreq: freqHz[peakIdx], threshold, edgeWarning };
}

// ── Canvas events ──────────────────────────────────────────────────────────
function addChartEvents(c) {
  c.addEventListener('wheel', e => {
    e.preventDefault();
    if (isSmithMode()) return;
    const rect = c.getBoundingClientRect();
    const px   = e.clientX - rect.left;
    const { plotW } = plotDims(canvas);
    if (px < PAD.left || px > PAD.left + plotW) return;

    const { fMin, fMax } = getFreqRange();
    const log = isLogScale();
    const fAtCursor = xToF(px, fMin, fMax, plotW, log);
    const factor    = e.deltaY > 0 ? 1.3 : 1 / 1.3;
    const global    = getGlobalFreqRange();

    let newMin, newMax;
    if (log) {
      const lAt  = Math.log10(fAtCursor);
      const lMin = Math.log10(fMin), lMax = Math.log10(fMax);
      newMin = Math.pow(10, lAt - (lAt - lMin) * factor);
      newMax = Math.pow(10, lAt + (lMax - lAt) * factor);
    } else {
      newMin = fAtCursor - (fAtCursor - fMin) * factor;
      newMax = fAtCursor + (fMax - fAtCursor) * factor;
    }

    newMin = Math.max(newMin, global.fMin);
    newMax = Math.min(newMax, global.fMax);
    if (newMax - newMin > 0) {
      viewState.zoom = { fMin: newMin, fMax: newMax };
      redraw();
    }
  }, { passive: false });

  c.addEventListener('pointerdown', e => {
    if (isSmithMode()) return;
    const { fMin, fMax } = getFreqRange();
    drag = { startX: e.offsetX, startFMin: fMin, startFMax: fMax };
    wasDragging = false;
    c.classList.add('panning');
    c.setPointerCapture(e.pointerId);
  });

  c.addEventListener('pointermove', e => {
    if (drag) {
      const dx = e.offsetX - drag.startX;
      if (Math.abs(dx) > 3) wasDragging = true;
      if (wasDragging) {
        c.classList.add('grabbing');
        const { plotW } = plotDims(canvas);
        const log = isLogScale();
        const global = getGlobalFreqRange();
        const { startFMin, startFMax } = drag;
        if (log) {
          const lMin = Math.log10(startFMin), lMax = Math.log10(startFMax);
          const dLog = -(dx / plotW) * (lMax - lMin);
          const clampMin = Math.max(Math.pow(10, lMin + dLog), global.fMin);
          const clampMax = Math.min(Math.pow(10, lMax + dLog), global.fMax);
          viewState.zoom = { fMin: clampMin, fMax: clampMax };
        } else {
          const df = -(dx / plotW) * (startFMax - startFMin);
          viewState.zoom = {
            fMin: Math.max(startFMin + df, global.fMin),
            fMax: Math.min(startFMax + df, global.fMax),
          };
        }
        redraw();
      }
    } else if (!isSmithMode()) {
      updateHoverReadout(e.offsetX);
    }
  });

  c.addEventListener('pointerup', () => {
    c.classList.remove('panning', 'grabbing');
    drag = null;
  });

  c.addEventListener('click', e => {
    if (wasDragging) { wasDragging = false; return; }
    if (isSmithMode()) return;
    const { plotW } = plotDims(canvas);
    if (e.offsetX < PAD.left || e.offsetX > PAD.left + plotW) return;
    const snapped = pixelToSnappedFreq(e.offsetX);
    if (snapped === null) return;
    viewState.markers[viewState.activeSlot] = { freqHz: snapped };
    viewState.activeSlot = 1 - viewState.activeSlot;
    mkSlot0Btn.classList.toggle('active', viewState.activeSlot === 0);
    mkSlot1Btn.classList.toggle('active', viewState.activeSlot === 1);
    redraw();
    updateMarkerPanel();
  });

  c.addEventListener('dblclick', () => {
    viewState.zoom = { fMin: null, fMax: null };
    redraw();
  });
}
addChartEvents(canvas);
addChartEvents(subCanvas);

function updateHoverReadout(px) {
  const { plotW } = plotDims(canvas);
  const { fMin, fMax } = getFreqRange();
  if (px < PAD.left || px > PAD.left + plotW || !getVisibleTraces().length) {
    hoverReadout.textContent = '—';
    return;
  }
  const log    = isLogScale();
  const f      = xToF(px, fMin, fMax, plotW, log);
  const traces = getVisibleTraces();
  if (isSmithMode()) {
    const parts = [formatFreq(f)];
    for (const { key, computed } of traces.slice(0, 4)) {
      const idx = nearestIdx(computed.freqHz, f);
      const mag = Math.sqrt(computed.real[idx] ** 2 + computed.imag[idx] ** 2);
      const ph  = Math.atan2(computed.imag[idx], computed.real[idx]) * 180 / Math.PI;
      parts.push(`S${key}: |Γ|=${mag.toFixed(4)} ∠${ph.toFixed(2)}°`);
    }
    hoverReadout.textContent = parts.join('  ');
  } else {
    const parts = [formatFreq(f)];
    for (const { key, computed } of traces.slice(0, 4)) {
      const idx = nearestIdx(computed.freqHz, f);
      const uv  = getUpperArray(computed)[idx];
      const lv  = getLowerArray(computed)[idx];
      parts.push(`S${key}: ${formatVal(uv, getUpperUnit())}/${formatVal(lv, getLowerUnit())}`);
    }
    hoverReadout.textContent = parts.join('  ');
  }
}

let freqRangeDebounce = null;
function applyFreqRange() {
  const fMin = toHz(+freqStartValEl.value, freqStartUnitEl.value);
  const fMax = toHz(+freqStopValEl.value,  freqStopUnitEl.value);
  if (!isFinite(fMin) || !isFinite(fMax) || fMin >= fMax || fMin < 0) return;
  viewState.zoom = { fMin, fMax };
  viewState.markers = [null, null];
  updateMarkerPanel();
  redraw();
}
function scheduleApplyFreqRange() {
  clearTimeout(freqRangeDebounce);
  freqRangeDebounce = setTimeout(applyFreqRange, 250);
}

[freqStartValEl, freqStopValEl].forEach(el => {
  el.addEventListener('input', scheduleApplyFreqRange);
});
function setupUnitHandler(unitEl, valEl, getHz) {
  unitEl.addEventListener('change', () => {
    clearTimeout(freqRangeDebounce);
    const { fMin: gMin, fMax: gMax } = getGlobalFreqRange();
    const u = unitEl.value;
    valEl.value = +hzToUnit(getHz(), u).toPrecision(6);
    valEl.min   = +hzToUnit(gMin, u).toPrecision(6);
    valEl.max   = +hzToUnit(gMax, u).toPrecision(6);
  });
}
setupUnitHandler(freqStartUnitEl, freqStartValEl, () => getFreqRange().fMin);
setupUnitHandler(freqStopUnitEl,  freqStopValEl,  () => getFreqRange().fMax);

// ── Export ─────────────────────────────────────────────────────────────────
function makeTimestamp() {
  const now = new Date();
  return `${(now.getMonth()+1).toString().padStart(2,'0')}${now.getDate().toString().padStart(2,'0')}${now.getHours().toString().padStart(2,'0')}${now.getMinutes().toString().padStart(2,'0')}`;
}
function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  Object.assign(document.createElement('a'), { href: url, download: filename }).click();
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}

document.getElementById('exportPngBtn').addEventListener('click', () => {
  redraw();
  const ts = makeTimestamp();
  if (isSmithMode() || subCanvas.style.display === 'none') {
    canvas.toBlob(blob => downloadBlob(blob, `waveform_${ts}.png`), 'image/png');
  } else {
    const oc  = document.createElement('canvas');
    oc.width  = canvas.width;
    oc.height = canvas.height + subCanvas.height;
    const oc_ctx = oc.getContext('2d');
    oc_ctx.drawImage(canvas, 0, 0);
    oc_ctx.drawImage(subCanvas, 0, canvas.height);
    oc.toBlob(blob => downloadBlob(blob, `waveform_${ts}.png`), 'image/png');
  }
});

document.getElementById('exportCsvBtn').addEventListener('click', () => {
  const traces = getVisibleTraces();
  if (!traces.length) return;

  const byFile = new Map();
  for (const tr of traces) {
    const id = tr.fileEntry.id;
    if (!byFile.has(id)) byFile.set(id, { fileEntry: tr.fileEntry, traces: [] });
    byFile.get(id).traces.push(tr);
  }

  const smith = isSmithMode();
  const fmt   = viewState.displayFormat;
  const csvFiles = [];

  for (const { fileEntry, traces: fTraces } of byFile.values()) {
    const baseName = fileEntry.name.replace(/\.s\d+p$/i, '');

    const headers = ['Freq[Hz]'];
    for (const { key } of fTraces) {
      if (smith || fmt === 'RI') {
        headers.push(`S${key}_re`, `S${key}_im`);
      } else if (fmt === 'DB') {
        headers.push(`S${key}_dB[dB]`, `S${key}_phase[°]`);
      } else {
        headers.push(`S${key}_mag`, `S${key}_phase[°]`);
      }
    }

    const N = fTraces[0].computed.freqHz.length;
    const lines = [
      ...TT.csvPreamble(fileEntry.parsed),
      headers.join(','),
    ];
    for (let i = 0; i < N; i++) {
      const row = [fTraces[0].computed.freqHz[i].toExponential(8)];
      for (const { computed } of fTraces) {
        if (smith || fmt === 'RI') {
          row.push(computed.real[i].toExponential(8), computed.imag[i].toExponential(8));
        } else if (fmt === 'DB') {
          row.push(computed.db[i].toExponential(8), computed.phase[i].toExponential(8));
        } else {
          row.push(computed.mag[i].toExponential(8), computed.phase[i].toExponential(8));
        }
      }
      lines.push(row.join(','));
    }
    csvFiles.push({ name: `${baseName}.csv`, data: lines.join('\r\n') + '\r\n' });
  }

  const ts  = makeTimestamp();
  const zip = TT.buildZip(csvFiles);
  downloadBlob(new Blob([zip], { type: 'application/zip' }), `waveform_${ts}.zip`);
});

// ── File loading ───────────────────────────────────────────────────────────
async function loadFiles(fileList_) {
  const snpFiles = Array.from(fileList_).filter(f => /\.s\d+p$/i.test(f.name));
  // Dedup by name + size (allows same name from different directories/revisions if size differs)
  const existKeys = new Set(files.map(f => f.fileKey));
  const errors = [];

  for (const file of snpFiles) {
    const fileKey = `${file.name}:${file.size}`;
    if (existKeys.has(fileKey)) continue;
    existKeys.add(fileKey);
    try {
      const n      = TT.portCount(file.name);
      const text   = await file.text();
      const parsed = TT.parseTouchstone(text, n);
      const fe     = {
        id:      nextId++,
        fileKey,
        name:    file.name,
        n,
        parsed,
        color:   PALETTE[nextColor++ % PALETTE.length],
        visible: true,
        computed: new Map(),
      };
      computeTraces(fe);

      // Auto-select S-params present in this file
      for (let i = 1; i <= n; i++) {
        for (let j = 1; j <= n; j++) {
          if (i === j) viewState.visibleParams.add(`${i}${j}`);
        }
      }
      files.push(fe);
    } catch (err) {
      errors.push(`${file.name}: ${err.message}`);
    }
  }

  if (errors.length) {
    errBanner.textContent = errors.join(' / ');
    errBanner.classList.add('show');
  } else {
    errBanner.classList.remove('show');
  }

  viewState.zoom = { fMin: null, fMax: null };
  renderAll();
}

const dropZone  = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

fileInput.addEventListener('change', e => loadFiles(e.target.files));
TT.setupDropZone(dropZone, loadFiles);

// ── Resize observer (DPR-aware) ────────────────────────────────────────────
new ResizeObserver(() => {
  dpr = window.devicePixelRatio || 1;
  canvas.width  = Math.round(canvas.clientWidth  * dpr);
  canvas.height = Math.round(canvas.clientHeight * dpr);
  if (subCanvas.offsetParent !== null && subCanvas.style.display !== 'none') {
    subCanvas.width  = Math.round(subCanvas.clientWidth  * dpr);
    subCanvas.height = Math.round(subCanvas.clientHeight * dpr);
  }
  redraw();
}).observe(canvasWrap);

// ── Initial layout ─────────────────────────────────────────────────────────
updateCanvasLayout();

// ── Init ───────────────────────────────────────────────────────────────────
redraw();
</script>
